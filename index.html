<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Touch This — Team Dashboard</title>
<style>
  :root{
    --bg:#faf7f2; --panel:#ffffff; --panel-2:#fbf8f4; --ink:#1c1418; --muted:#8a7d80;
    --line:#eadfd4; --accent:#6e2334; --accent-soft:#9a4453; --cream:#f0e6cf;
    --win:#3f9d6d; --loss:#b0546b; --draw:#c8912f; --pending:#8a7d80;
    --shadow:0 1px 2px rgba(60,20,30,.05),0 6px 22px rgba(60,20,30,.06);
    --radius:16px;
    --kline:#c9b9a6;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 20px 70px}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .muted{color:var(--muted)}
  h1,h2,h3{letter-spacing:-.02em}

  /* Hero */
  .hero{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .hero .crest{width:56px;height:62px;flex:none}
  .hero h1{margin:0;font-size:27px;font-weight:680}
  .hero .motto{margin:2px 0 0;color:var(--accent-soft);font-style:italic;font-size:14px}
  .hero .sub{margin:2px 0 0;color:var(--muted);font-size:13px}
  .hero-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  select{font:inherit;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 11px;cursor:pointer}
  .icon-btn{width:38px;height:38px;border:1px solid var(--line);background:var(--panel);border-radius:10px;
    cursor:pointer;color:var(--muted);font-size:16px;display:inline-flex;align-items:center;justify-content:center}
  .icon-btn:hover{color:var(--ink)}

  /* Segmented nav */
  .nav{margin:22px 0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .seg{display:inline-flex;background:color-mix(in srgb,var(--accent) 7%, var(--panel));
    border:1px solid var(--line);border-radius:13px;padding:4px;gap:2px}
  .seg button{border:none;background:transparent;color:var(--muted);font:inherit;font-weight:550;font-size:13.5px;
    padding:8px 17px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:background .18s,color .18s}
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--panel);color:var(--accent);box-shadow:var(--shadow)}

  /* Cards + grid */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 14px;font-size:11.5px;font-weight:650;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .mt{margin-top:16px}
  .section-t{margin:34px 0 4px;font-size:19px;font-weight:640}
  .section-s{margin:0 0 14px;color:var(--muted);font-size:13.5px}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--shadow)}
  .kpi .v{font-size:23px;font-weight:680;letter-spacing:-.03em}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.3}

  /* Hero standing strip */
  .hero-card{background:color-mix(in srgb,var(--accent) 5%,var(--panel));
    border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);
    margin-top:18px}
  .hero-card .wm{display:none}
  .hero-card .lead{font-size:14px;color:var(--muted);margin:0 0 6px}
  .hero-card .big{font-size:22px;font-weight:660;margin:0}
  .hero-card .story{margin:10px 0 0;max-width:640px;font-size:13.5px;color:var(--ink)}

  /* Next fixture */
  .next{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .next .vs{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .next .opp{font-size:20px;font-weight:640;margin:2px 0 0}
  .next .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .next .cta{margin-left:auto}

  /* Form chips */
  .form{display:flex;gap:6px;align-items:center}
  .chip{width:26px;height:26px;border-radius:8px;font-size:12px;font-weight:650;
    display:inline-flex;align-items:center;justify-content:center}
  .chip.w{background:color-mix(in srgb,var(--win) 20%,transparent);color:var(--win)}
  .chip.l{background:color-mix(in srgb,var(--loss) 20%,transparent);color:var(--loss)}
  .chip.d{background:color-mix(in srgb,var(--draw) 22%,transparent);color:var(--draw)}
  .chip.tbd{background:var(--line);color:var(--muted)}

  /* Tables */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;background:var(--panel)}
  th,td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;white-space:nowrap}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);user-select:none}
  th.sortable{cursor:pointer}
  th.sortable:hover{color:var(--ink)}
  th .arrow{opacity:.5;font-size:9px;margin-left:2px}
  td.num,th.num{text-align:center;font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.clickable{cursor:pointer}
  tbody tr.clickable:hover{background:var(--panel-2)}
  .hl{background:color-mix(in srgb,var(--accent) 6%,var(--panel))}

  /* Pills / result badges */
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;line-height:1.6;white-space:nowrap;
    background:var(--line);color:var(--muted)}
  .pill.league{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
  .pill.playoff{background:color-mix(in srgb,var(--draw) 22%,transparent);color:var(--draw)}
  .pill.up{background:color-mix(in srgb,var(--pending) 18%,transparent);color:var(--muted)}
  .res{display:inline-flex;min-width:24px;height:24px;padding:0 6px;border-radius:7px;font-size:11.5px;font-weight:650;
    align-items:center;justify-content:center}
  .res.w{background:color-mix(in srgb,var(--win) 18%,transparent);color:var(--win)}
  .res.l{background:color-mix(in srgb,var(--loss) 18%,transparent);color:var(--loss)}
  .res.d{background:color-mix(in srgb,var(--draw) 20%,transparent);color:var(--draw)}
  .res.tbd{background:var(--line);color:var(--muted)}

  /* Bar leaderboard */
  .bar-row{display:flex;align-items:center;gap:12px;margin:9px 0}
  .bar-row .name{width:130px;flex:none;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;background:var(--line);border-radius:7px;height:20px;overflow:hidden}
  .bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent),var(--accent-soft));
    min-width:3px;transition:width .3s ease}
  .bar-row .val{width:38px;flex:none;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:var(--muted)}

  /* Roster */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .pcard{border:1px solid var(--line);border-radius:13px;padding:13px 15px;background:var(--panel-2);display:flex;gap:12px;align-items:flex-start}
  .avatar{width:38px;height:38px;border-radius:50%;flex:none;background:var(--accent);color:var(--cream);
    display:inline-flex;align-items:center;justify-content:center;font-weight:660;font-size:14px}
  .pcard .pn{font-weight:600;font-size:14px}
  .pcard .pr{font-size:12px;color:var(--muted)}

  /* Bracket */
  .bracket{display:flex;flex-direction:column;gap:14px}
  .bracket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .tie.tie-tt{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent)}
  .placings{list-style:none;padding:0;margin:0;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--panel);max-width:440px;box-shadow:var(--shadow)}
  .placings li{display:flex;gap:12px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);font-size:14px}
  .placings li:last-child{border-bottom:none}
  .placings li.tt{background:color-mix(in srgb,var(--accent) 9%,transparent);font-weight:640}
  .placings .pp{width:20px;color:var(--muted);font-variant-numeric:tabular-nums;text-align:right}
  .ptype{display:inline-block;font-size:9.5px;font-weight:650;letter-spacing:.04em;text-transform:uppercase;padding:1px 6px;border-radius:5px;background:var(--line);color:var(--muted);vertical-align:middle}
  .ptype.core{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
  .ptype.regular{background:color-mix(in srgb,var(--draw) 24%,transparent);color:var(--draw)}
  /* knockout bracket */
  .ko{display:flex;align-items:stretch;overflow-x:auto;padding:10px 2px}
  .ko-round{display:flex;flex-direction:column;flex:0 0 auto;min-width:212px}
  .ko-round:not(:last-child){margin-right:46px}
  .ko-pair{display:flex;flex-direction:column;flex:1;position:relative;min-height:250px}
  .ko-pair > .ko-cell{flex:1;display:flex;align-items:center}
  .ko-cell-center{flex:1;display:flex;align-items:center}
  .ko-m{position:relative;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;box-shadow:var(--shadow)}
  .ko-mh{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 12px 3px}
  .ko-row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px 12px;font-size:13.5px}
  .ko-row + .ko-row{border-top:1px solid var(--line)}
  .ko-row.w{font-weight:660;background:color-mix(in srgb,var(--win) 13%,transparent)}
  .ko-row.ko-me{box-shadow:inset 3px 0 0 var(--accent)}
  .ko-t{display:flex;align-items:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ko-seed{font-style:normal;min-width:15px;color:var(--muted);font-size:11px;margin-right:8px;text-align:center;flex:none}
  .ko-s{font-variant-numeric:tabular-nums;font-weight:600;flex:none}
  .ko-note{font-size:11px;color:var(--muted);padding:3px 12px 9px;line-height:1.45}
  .ko-champ{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent),var(--shadow)}
  .ko-champ .ko-mh{color:var(--accent)}
  .ko-champ-name{padding:6px 12px 12px;font-weight:680;font-size:16px;letter-spacing:-.01em}
  .ko-pair > .ko-cell > .ko-m::after{content:'';position:absolute;left:100%;top:50%;width:20px;height:2px;background:var(--kline)}
  .ko-pair::after{content:'';position:absolute;left:calc(100% + 20px);top:25%;bottom:25%;width:2px;background:var(--kline)}
  .ko-pair::before{content:'';position:absolute;left:calc(100% + 20px);top:50%;width:26px;height:2px;background:var(--kline)}
  .ko-round:not(:last-child) .ko-cell-center > .ko-m::after{content:'';position:absolute;left:100%;top:50%;width:46px;height:2px;background:var(--kline)}
  .ko-consol{margin-top:16px;max-width:290px}
  .ko-cap{color:var(--muted);font-size:12.5px;margin:10px 2px 0;max-width:660px;line-height:1.55}
  .tie{border:1px solid var(--line);border-radius:13px;overflow:hidden;max-width:360px;background:var(--panel)}
  .tie .trow{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid var(--line);font-size:14px}
  .tie .trow:last-child{border-bottom:none}
  .tie .trow.win{background:color-mix(in srgb,var(--win) 12%,transparent);font-weight:640}
  .tie .tlabel{padding:8px 15px;font-size:11.5px;color:var(--muted);background:var(--panel-2);text-transform:uppercase;letter-spacing:.05em}

  .statline{display:flex;gap:30px;flex-wrap:wrap;margin:0 0 6px}
  .statline .s .sv{font-size:20px;font-weight:680;letter-spacing:-.02em}
  .statline .s .sl{font-size:11.5px;color:var(--muted);margin-top:2px}
  .h2h-list{margin-top:4px}
  .h2h-meet{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px}
  .h2h-meet .d{width:92px;flex:none;color:var(--muted)}
  .h2h-meet .sc{font-variant-numeric:tabular-nums;font-weight:600}
  .h2h-meet .mvp-tag{margin-left:auto;font-size:11.5px;color:var(--muted)}
  .h2h-more{display:inline-block;margin-top:12px;font-size:13px}
  .facts{list-style:none;margin:0;padding:0}
  .facts li{padding:9px 0;border-top:1px solid var(--line);font-size:14px}
  .facts li:first-child{border-top:none;padding-top:0}
  .empty{padding:18px;text-align:center;color:var(--muted);font-size:13.5px;border:1px dashed var(--line);border-radius:12px;background:var(--panel-2)}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;margin-bottom:6px}

  .foot{margin-top:40px;color:var(--muted);font-size:12px;line-height:1.6}
  .foot code{background:var(--panel-2);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:11.5px}

  @media (max-width:820px){
    .kpis{grid-template-columns:repeat(3,1fr)}
    .g2,.g3{grid-template-columns:1fr}
    .hero h1{font-size:23px}
    .next .cta{margin-left:0;width:100%}
  }
  @media (max-width:480px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .bar-row .name{width:96px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="crest" id="crest"></div>
    <div>
      <h1>Touch This</h1>
      <p class="sub">GO Mammoth (London) · mixed 6-a-side touch rugby</p>
    </div>
    <div class="hero-right">
      <div class="seg" id="season-seg" aria-label="Season"></div>
    </div>
  </header>

  <nav class="nav">
    <div class="seg" id="seg">
      <button data-nav="home">Overview</button>
      <button data-nav="fixtures">Fixtures</button>
      <button data-nav="table">Table</button>
      <button data-nav="playoffs">Play-offs</button>
      <button data-nav="players">Players</button>
      <button data-nav="stats">Stats</button>
    </div>
  </nav>

  <main>
    <section data-view="home"></section>
    <section data-view="fixtures" hidden></section>
    <section data-view="table" hidden></section>
    <section data-view="playoffs" hidden></section>
    <section data-view="players" hidden></section>
    <section data-view="stats" hidden></section>
    <section data-view="opponent" hidden></section>
  </main>

</div>

<script>
/* ============================================================================
   DATA — this is the only thing you edit.
   HOW TO ADD A WEEK (Season 2):
     1. Find the matching s2-wN stub in fixtures[] below (or copy one).
     2. Fill: date ("YYYY-MM-DD"), opponent (a slug from opponents[]),
        played:true, ttScore, oppScore, result ("W"/"L"/"D"),
        scorers:[{player:"franny",tries:2}, ...]  (or [] if nobody scored),
        mvp:"franny", notes:"...".
     3. If a new opponent/player appears, add them to opponents[] / players[].
   Missing data: use null. score null -> "TBD"; scorers null -> "Not recorded";
   scorers [] -> genuinely nobody scored; played:false -> upcoming fixture.
   Everything (table, head-to-head, leaderboards, form) recomputes automatically.
   ==========================================================================*/
/* ====== DATA ====== */
const TT = {
  team: {
    name: "Touch This", short: "TT", motto: "Tango ergo sum",
    league: "GO Mammoth (London) — mixed 6-a-side",
    rules: { onPitch:6, touches:6, halves:2, halfMins:17, minFemaleOnPitch:2, kicking:false,
             points:{ win:3, loss:1, bye:0 } }
  },

  players: [
    { id:"gayatri",  name:"Gayatri",           nickname:"G",           type:"core",    role:"Co-captain. Founded the team, paid the league fee, designed the kit." },
    { id:"ella",     name:"Ella",              nickname:"El Capitan",  type:"core",    role:"Player. Guested for the Wasps in Match 5." },
    { id:"harit",    name:"Harit",             nickname:null,          type:"core",    role:"Co-captain. Ran scouting, tactics and the match reports." },
    { id:"franny",   name:"Francisco",         nickname:"Fran",        type:"core",    role:"Player. Top try scorer of the season." },
    { id:"sarah",    name:"Sarah",             nickname:null,          type:"core",    role:"Player." },
    { id:"max",      name:"Max Gutsche",       nickname:null,          type:"core",    role:"Player." },
    { id:"helena",   name:"Helena Murray",     nickname:null,          type:"core",    role:"Player." },
    { id:"robert",   name:"Robert Hutchinson", nickname:"Rob",         type:"squad",   role:"Squad player. Sideline support early, then started and starred in Match 7." },
    { id:"bex",      name:"Bex Dunnet",        nickname:"Bex",         type:"squad",   role:"Squad player." },
    { id:"sam",      name:"Sam",               nickname:null,          type:"regular", role:"Season regular via Fran from 26 Apr. Two standout shifts." },
    { id:"martin",   name:"Martin",            nickname:null,          type:"ringer",  role:"Sub. Quick try scorer." },
    { id:"kingsley", name:"Kingsley",          nickname:null,          type:"ringer",  role:"Sub. Double interception in Match 6." },
    { id:"ieuan",    name:"Ieuan",             nickname:null,          type:"ringer",  role:"Sub in Match 2." },
    { id:"charlotte",name:"Charlotte",         nickname:null,          type:"ringer",  role:"Sub in Match 6." },
    { id:"henry",    name:"Henry",             nickname:null,          type:"ringer",  role:"Sub in Match 7." },
    { id:"sophie",   name:"Sophie",            nickname:null,          type:"ringer",  role:"Sub in Match 7." },
    { id:"moustache-man", name:"Mystery sub",  nickname:"moustache man", type:"ringer", role:"Sub in Match 2, reportedly very fast." }
  ],

  opponents: [
    { id:"touchdown-titans", name:"Touchdown Titans v2", finish:5, colours:null,
      notes:"Finished 5th. TT's first opponent (Match 1) and the 5th/6th play-off opponent (Match 7) — the same 3 to 7 scoreline both times." },
    { id:"dirty-dogs", name:"The Dirty Dogs", finish:4, colours:null,
      notes:"Finished 4th. Inflicted TT's heaviest defeat, 0 to 11 (Match 2)." },
    { id:"scoregasms", name:"Scoregasms", finish:1, colours:null,
      notes:"Won the league and the play-off final (1st). Held TT to a single try in heavy rain (Match 3), TT's best defensive display." },
    { id:"churchills", name:"Sponsored by Churchills", finish:2, colours:null,
      notes:"Finished 2nd with the division's best defence. TT still scored twice (Match 4). Rematch in Late Summer on 22 Jul." },
    { id:"wandsworth-wasps", name:"Wandsworth Wasps", finish:7, colours:null,
      notes:"The designated rivals. Beat TT 5 to 3 in the 6th-vs-7th shootout (Match 5) but finished 7th, below TT, after losing their play-off semi heavily. Ella guested for them that week." },
    { id:"try-hard-2", name:"Try Hard 2: Try Harder", finish:3, colours:null,
      notes:"Finished 3rd. TT's best attacking game came here: 7 tries, lost 7 to 8 (Match 6)." },
    { id:"tag-me-if-you-can", name:"Tag Me If You Can", colours:null,
      notes:"New Late Summer opponent. First meeting on 15 Jul." },
    { id:"touching-wands", name:"Touching Wands", colours:null,
      notes:"New Late Summer opponent. First meeting on 29 Jul." },
    { id:"touch-me", name:"Touch Me", colours:null,
      notes:"New Late Summer opponent. First meeting on 12 Aug." }
  ],

  seasons: [
    { id:"2026-spring", name:"Early Summer 2026", status:"finished", finalPosition:7, teamsInLeague:7, points:6, finalPlacing:6,
      summary:"Finished 7th of 7 in the league on 6 points, then 6th overall after the play-off. Winless, but the attack grew every week: tries per game went 0, 1, 2, 3, 7, and a different player won the MVP award each week." },
    { id:"2026-summer", name:"Late Summer 2026", status:"active", finalPosition:null, teamsInLeague:null, points:null, finalPlacing:null,

  // Final regular-season league table (all seven teams) — from the official record.
  standings: {

      { pos:1, team:"Scoregasms",              p:6, w:5, l:1, tf:36, ta:17, pts:16 },
      { pos:2, team:"Try Hard 2: Try Harder",  p:6, w:4, l:2, tf:41, ta:25, pts:14 },
      { pos:3, team:"Sponsored by Churchills", p:6, w:4, l:2, tf:34, ta:21, pts:14 },

      { pos:6, team:"Wandsworth Wasps",        p:6, w:1, l:5, tf:13, ta:45, pts:8 },
      { pos:7, team:"Touch This (TT)",         p:6, w:0, l:6, tf:16, ta:49, pts:6, tt:true }
    ],
    "2026-summer": [
      { team:"Touch This (TT)",         p:0, w:0, l:0, tf:0, ta:0, pts:0, tt:true },
      { team:"Touchdown Titans v2",     p:0, w:0, l:0, tf:0, ta:0, pts:0 },
      { team:"Wandsworth Wasps",        p:0, w:0, l:0, tf:0, ta:0, pts:0 },

/* ---------- helpers ---------- */
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byId = (arr,id) => arr.find(x=>x.id===id);
const opp = id => byId(TT.opponents,id);
const player = id => byId(TT.players,id);
const season = id => byId(TT.seasons,id);
const oppName = id => (opp(id)?.name) || 'TBC';
const playerName = id => { const p=player(id); return p ? p.name : id; };
const playerShort = id => { const p=player(id); return p ? (p.nickname||p.name.split(' ')[0]) : id; };
const initials = n => n.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const NR = '<span class="muted">Not recorded</span>';

function fmtDate(d){
  if(!d) return 'TBC';
  const dt=new Date(d+'T00:00:00');
  return isNaN(dt)? 'TBC' : dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fxResult(f){
  if(f.result) return f.result;
  if(f.ttScore!=null && f.oppScore!=null)
    return f.ttScore>f.oppScore?'W':f.ttScore<f.oppScore?'L':'D';
  return null;
}
function resBadge(r){
  if(r==='W') return '<span class="res w">W</span>';
  if(r==='L') return '<span class="res l">L</span>';
  if(r==='D') return '<span class="res d">D</span>';
  return '<span class="res tbd">–</span>';
}
function scoreText(f){
  if(!f.played) return '<span class="muted">Upcoming</span>';
  if(f.ttScore==null || f.oppScore==null) return '<span class="muted">TBD</span>';
  return f.ttScore+'&ndash;'+f.oppScore;
}
function compPill(f){
  if(f.competition==='playoff') return '<span class="pill playoff">Play-off</span>';
  if(!f.played) return '<span class="pill up">Upcoming</span>';
  return '<span class="pill league">League</span>';
}
function scorersText(f){
  const un = f.unattributed||0;
  if(f.scorers==null && !un) return NR;
  const named = Array.isArray(f.scorers) ? f.scorers.map(s=>{
    const pid=typeof s==='string'?s:s.player, t=typeof s==='string'?1:(s.tries||1);
    return esc(playerShort(pid))+(t>1?' &times;'+t:'');
  }) : [];
  if(un) named.push('<span class="muted">+'+un+' unattributed</span>');
  return named.length ? named.join(', ') : '<span class="muted">&mdash;</span>';
}
function mvpText(f){ return f.mvp ? esc(playerName(f.mvp.player))+' <span class="muted">('+esc(f.mvp.award)+')</span>' : NR; }
function oppLink(id){ return id ? `<a href="#opponent/${id}">${esc(oppName(id))}</a>` : '<span class="muted">TBC</span>'; }

/* ---------- computations (pure over TT.fixtures) ---------- */
function inScope(f,sid){ return sid==='all' || f.season===sid; }

function teamRecord(sid){
  const fx = TT.fixtures.filter(f=>inScope(f,sid) && f.competition==='league' && f.played);
  let w=0,l=0,d=0,tf=0,ta=0,tfU=false,taU=false;
  fx.forEach(f=>{
    const r=fxResult(f);
    if(r==='W')w++; else if(r==='L')l++; else if(r==='D')d++;
    if(f.ttScore!=null) tf+=f.ttScore; else tfU=true;
    if(f.oppScore!=null) ta+=f.oppScore; else taU=true;
  });
  const pts = w*TT.team.rules.points.win + l*TT.team.rules.points.loss;
  return { played:fx.length, w,l,d, tf,ta, tfU,taU, pts, diff:tf-ta };
}
function bestPerf(sid){
  const fx = TT.fixtures.filter(f=>inScope(f,sid) && f.played && f.ttScore!=null);
  if(!fx.length) return null;
  return fx.slice().sort((a,b)=> b.ttScore-a.ttScore || (b.ttScore-b.oppScore)-(a.ttScore-a.oppScore))[0];
}
function formGuide(sid,n=5){
  return TT.fixtures.filter(f=>inScope(f,sid) && f.competition==='league' && f.played)
    .sort((a,b)=>(a.date||'')<(b.date||'')?-1:1).slice(-n).map(fxResult);
}
function nextFixture(){
  return TT.fixtures.filter(f=>!f.played && f.competition!=='bye')
    .sort((a,b)=>(a.date||'9999-99-99')<(b.date||'9999-99-99')?-1:1)[0] || null;
}
function headToHead(oppId){
  const all = TT.fixtures.filter(f=>f.opponent===oppId)
    .sort((a,b)=>(a.date||'9999')<(b.date||'9999')?-1:1);
  const played = all.filter(f=>f.played);
  let w=0,l=0,d=0,tf=0,ta=0,tfU=false,taU=false;
  played.forEach(f=>{
    const r=fxResult(f);
    if(r==='W')w++; else if(r==='L')l++; else if(r==='D')d++;
    if(f.ttScore!=null) tf+=f.ttScore; else tfU=true;
    if(f.oppScore!=null) ta+=f.oppScore; else taU=true;
  });
  return { all, played, upcoming:all.filter(f=>!f.played), w,l,d, tf,ta, tfU,taU };
}
function tallyScorers(sid){
  const m={};
  TT.fixtures.filter(f=>inScope(f,sid) && Array.isArray(f.scorers)).forEach(f=>{
    f.scorers.forEach(s=>{ const pid=typeof s==='string'?s:s.player, t=typeof s==='string'?1:(s.tries||1); m[pid]=(m[pid]||0)+t; });
  });
  return Object.entries(m).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n);
}
function tallyMvp(sid){
  const m={};
  TT.fixtures.filter(f=>inScope(f,sid) && f.mvp && f.mvp.player).forEach(f=>{ m[f.mvp.player]=(m[f.mvp.player]||0)+1; });
  return Object.entries(m).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n);
}
function totalUnattributed(sid){
  return TT.fixtures.filter(f=>inScope(f,sid)).reduce((s,f)=>s+(f.unattributed||0),0);
}
function tallyApps(sid){
  const m={}; let any=false;
  TT.fixtures.filter(f=>inScope(f,sid) && f.played && Array.isArray(f.lineup)).forEach(f=>{
    any=true; f.lineup.forEach(pid=>m[pid]=(m[pid]||0)+1);
  });
  return { any, list:Object.entries(m).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n) };
}
function withUnknown(n,unknown){ return unknown ? (n+'+') : String(n); }

/* ---------- bar leaderboard ---------- */
function barChart(items, nameFn, emptyMsg){
  if(!items.length) return `<div class="empty">${esc(emptyMsg)}</div>`;
  const max = Math.max(...items.map(i=>i.n));
  return items.map(i=>`
    <div class="bar-row">
      <div class="name">${esc(nameFn(i))}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(i.n/max*100)}%"></div></div>
      <div class="val">${i.n}</div>
    </div>`).join('');
}

const pct = (n,d)=> d? Math.round(n/d*100):0;
function ordinal(n){ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

function renderFixtures(){
  const host = $('[data-view="fixtures"]');
  const sf = fxState.season, cf = fxState.comp;
  let rows = TT.fixtures.filter(f=>{
    if(sf!=='all' && f.season!==sf) return false;
    if(cf!=='all' && f.competition!==cf) return false;
    return true;
  });
  rows = sortFixtures(rows);

  const body = rows.map(f=>{
    if(f.competition==='bye') return `
    <tr>
      <td>${fmtDate(f.date)}</td>
      <td class="muted">${esc(season(f.season)?.name||f.season)}</td>
      <td><span class="pill">Bye</span></td>
      <td class="muted">&mdash;</td>
      <td class="num muted">&mdash;</td><td class="num muted">&mdash;</td>
      <td class="muted">&mdash;</td><td class="muted">&mdash;</td>
    </tr>`;
    return `
    <tr class="${f.opponent?'clickable':''}" ${f.opponent?`onclick="location.hash='#opponent/${f.opponent}'"`:''}>
      <td>${fmtDate(f.date)}${f.time?`<div class="muted" style="font-size:12px">${esc(f.time)}</div>`:''}</td>
      <td class="muted">${esc(season(f.season)?.name||f.season)}</td>
      <td>${compPill(f)}</td>
      <td>${oppLink(f.opponent)}</td>
      <td class="num">${scoreText(f)}</td>
      <td class="num">${resBadge(fxResult(f))}</td>
      <td>${scorersText(f)}</td>
      <td>${mvpText(f)}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="8"><div class="empty">No fixtures match these filters.</div></td></tr>`;

  const arrow = k => fxState.key===k ? `<span class="arrow">${fxState.dir>0?'▲':'▼'}</span>` : '';

  host.innerHTML = `
    <h2 class="section-t">Every game</h2>
    <p class="section-s">All fixtures across both seasons. Click a row to open the opponent's head-to-head.</p>
    <div class="grid" style="grid-template-columns:auto auto;justify-content:start;margin-bottom:14px">
      <span><label class="muted" style="font-size:12px;margin-right:6px">Season</label>
        <select id="fx-season"></select></span>
      <span><label class="muted" style="font-size:12px;margin-right:6px">Competition</label>
        <select id="fx-comp">
          <option value="all">All</option>
          <option value="league">League</option>
          <option value="playoff">Play-offs</option>
        </select></span>
    </div>
    <div class="tablewrap"><table>
      <thead><tr>
        <th class="sortable" data-sort="date">Date ${arrow('date')}</th>
        <th>Season</th><th>Comp</th>
        <th class="sortable" data-sort="opponent">Opponent ${arrow('opponent')}</th>
        <th class="num sortable" data-sort="score">Score ${arrow('score')}</th>
        <th class="num sortable" data-sort="result">Res ${arrow('result')}</th>
        <th>Try scorers</th><th>MVP</th>
      </tr></thead>
      <tbody>${body}</tbody>
    </table></div>`;

  // season options
  const fss=$('#fx-season');
  fss.innerHTML = '<option value="all">All seasons</option>'+TT.seasons.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  fss.value=sf; $('#fx-comp').value=cf;
  fss.addEventListener('change',()=>{fxState.season=fss.value;renderFixtures();});
  $('#fx-comp').addEventListener('change',e=>{fxState.comp=e.target.value;renderFixtures();});
  $$('[data-view="fixtures"] th.sortable').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.sort;
    if(fxState.key===k) fxState.dir*=-1; else {fxState.key=k;fxState.dir=1;}
    renderFixtures();
  }));
}
const fxState = { season:'all', comp:'all', key:'date', dir:1 };
function sortFixtures(rows){
  const k=fxState.key, d=fxState.dir;
  const val=f=> k==='date'?(f.date||'9999-99-99')
            : k==='opponent'?(oppName(f.opponent)||'')
            : k==='score'?(f.ttScore==null?-1:f.ttScore)
            : k==='result'?({W:3,D:2,L:1}[fxResult(f)]||0):0;
  return rows.slice().sort((a,b)=>{ const x=val(a),y=val(b); return (x<y?-1:x>y?1:0)*d; });
}

function renderTable(){
  const host=$('[data-view="table"]');
  let sid=cur(); if(sid==='all') sid = TT.seasons.filter(s=>s.status==='finished').slice(-1)[0]?.id || TT.seasons[0].id;
  const s=season(sid);
  const table = TT.standings && TT.standings[sid];
  if(table){
    const finished = s && s.status==='finished';
    const rec = teamRecord(sid);
    // Touch This row is always live from fixtures; rivals come from the seeded standings.
    let data = table.map(r=> r.tt ? {...r, p:rec.played, w:rec.w, l:rec.l, tf:rec.tf, ta:rec.ta, pts:rec.pts} : {...r});
    const hasPos = finished && data.every(r=>typeof r.pos==='number');
    data.sort(hasPos ? (a,b)=>a.pos-b.pos
                     : (a,b)=> b.pts-a.pts || (b.tf-b.ta)-(a.tf-a.ta) || b.tf-a.tf || a.team.localeCompare(b.team));
    const anyPlayed = data.some(r=>r.p>0);
    const rows = data.map((r,i)=>`
      <tr class="${r.tt?'hl':''}">
        <td class="num">${finished ? (r.pos||i+1) : (anyPlayed ? i+1 : '–')}</td>
        <td>${r.tt?`<strong>${esc(r.team)}</strong>`:esc(r.team)}</td>
        <td class="num">${r.p}</td><td class="num">${r.w}</td><td class="num">${r.l}</td>
        <td class="num">${r.tf}</td><td class="num">${r.ta}</td>
        <td class="num">${(r.tf-r.ta>0?'+':'')+(r.tf-r.ta)}</td>
        <td class="num"><strong>${r.pts}</strong></td>
      </tr>`).join('');
    const caption = finished
      ? `Final regular-season standings. Touch This finished ${ordinal(s.finalPosition)} of ${data.length}${s.finalPlacing?`, then ${ordinal(s.finalPlacing)} overall after the play-offs`:''}.`
      : `All ${data.length} teams in the division. The Touch This row updates automatically from results; rivals' records fill in as the league table is shared.`;
    host.innerHTML = `
      <h2 class="section-t">League table &mdash; ${esc(s.name)}</h2>
      <p class="section-s">${caption}</p>
      <div class="tablewrap"><table>
        <thead><tr><th class="num">Pos</th><th>Team</th><th class="num">P</th><th class="num">W</th><th class="num">L</th><th class="num">TF</th><th class="num">TA</th><th class="num">Diff</th><th class="num">Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="section-s" style="margin-top:12px">Points: ${TT.team.rules.points.win} for a win, ${TT.team.rules.points.loss} for a loss, ${TT.team.rules.points.bye} for a bye. One try equals one point in this league, so a team's tries are its match score.</p>`;
    return;
  }
  const rec=teamRecord(sid);
  host.innerHTML = `
    <h2 class="section-t">League table &mdash; ${esc(s?s.name:'')}</h2>
    <p class="section-s">${s&&s.status==='active'?'Season in progress. The full table appears once results are in; the running Touch This row is shown below.':'Standings build up as games are played.'}</p>
    <div class="tablewrap"><table>
      <thead><tr><th class="num">Pos</th><th>Team</th><th class="num">P</th><th class="num">W</th><th class="num">L</th><th class="num">D</th><th class="num">TF</th><th class="num">TA</th><th class="num">Diff</th><th class="num">Pts</th></tr></thead>
      <tbody><tr class="hl">
        <td class="num">${s&&s.finalPosition?s.finalPosition:'–'}</td>
        <td><strong>Touch This</strong></td>
        <td class="num">${rec.played}</td><td class="num">${rec.w}</td><td class="num">${rec.l}</td><td class="num">${rec.d}</td>
        <td class="num">${withUnknown(rec.tf,rec.tfU)}</td><td class="num">${withUnknown(rec.ta,rec.taU)}</td>
        <td class="num">${(rec.diff>0?'+':'')+rec.diff}</td><td class="num"><strong>${rec.pts}</strong></td>
      </tr></tbody>
    </table></div>`;
}

function renderPlayoffs(){
  const host=$('[data-view="playoffs"]');
  let sid=cur(); if(sid==='all') sid='2026-spring';
  const s=season(sid);
  const games = (TT.playoffs && TT.playoffs[sid]) || [];
  const placings = TT.finalPlacings && TT.finalPlacings[sid];
  if(!games.length){
    const fx = TT.fixtures.filter(f=>f.competition==='playoff' && f.season===sid);
    const t = fx.map(f=>`<div class="tie">
      <div class="tlabel">${esc(f.playoffRound||'Play-off')} · ${fmtDate(f.date)}</div>
      <div class="trow ${fxResult(f)==='W'?'win':''}"><span>Touch This</span><span>${f.ttScore==null?'&mdash;':f.ttScore}</span></div>
      <div class="trow ${fxResult(f)==='L'?'win':''}"><span>${f.opponent?esc(oppName(f.opponent)):'TBC'}</span><span>${f.oppScore==null?'&mdash;':f.oppScore}</span></div>
      ${fxResult(f)?'':'<div class="tlabel" style="text-transform:none;letter-spacing:0">To be played</div>'}
    </div>`).join('') || '<div class="empty">No play-off fixtures for this season yet.</div>';
    host.innerHTML = `<h2 class="section-t">Play-offs &mdash; ${esc(s?s.name:'')}</h2>
      <p class="section-s">Knockout stage after the regular season.</p>
      <div class="bracket-grid">${t}</div>`;
    return;
  }
  // ---- proper knockout bracket ----
  const seedMap={}; (TT.standings[sid]||[]).forEach(r=>{ if(r.pos) seedMap[r.team]=r.pos; });
  const G = st => games.find(g=>g.stage===st);
  const winner = g => g ? (g.s1>g.s2?g.t1:g.t2) : null;
  const sf1=G('Semi-final 1'), sf2=G('Semi-final 2'), sf3=G('Semi-final 3'),
        fin=G('Final'), bronze=G('3rd / 4th'), fifth=G('5th / 6th');
  const row = (name,score,win)=>`
      <div class="ko-row ${win?'w':''} ${/Touch This/.test(name)?'ko-me':''}">
        <span class="ko-t">${seedMap[name]?`<i class="ko-seed">${seedMap[name]}</i>`:''}${esc(name)}</span>
        <span class="ko-s">${score==null?'':score}</span></div>`;
  const mcard = (g,label)=> g ? `
    <div class="ko-m">
      <div class="ko-mh">${esc(label||g.stage)} · ${fmtDate(g.date)}</div>
      ${row(g.t1,g.s1,g.s1>g.s2)}
      ${row(g.t2,g.s2,g.s2>g.s1)}
      ${g.note?`<div class="ko-note">${esc(g.note)}</div>`:''}
    </div>` : '';
  const byeCard = `
    <div class="ko-m">
      <div class="ko-mh">First round</div>
      <div class="ko-row ko-me"><span class="ko-t"><i class="ko-seed">7</i>Touch This (TT)</span><span class="ko-s">bye</span></div>
      <div class="ko-note">7th seed &mdash; a bye straight into the 5th/6th play-off.</div>
    </div>`;
  const champCard = fin ? `
    <div class="ko-m ko-champ">
      <div class="ko-mh">Champions</div>
      <div class="ko-champ-name">${esc(winner(fin))}</div>
    </div>` : '';
  const champBracket = `
    <div class="ko">
      <div class="ko-round"><div class="ko-pair">
        <div class="ko-cell">${mcard(sf1)}</div>
        <div class="ko-cell">${mcard(sf2)}</div>
      </div></div>
      <div class="ko-round"><div class="ko-cell-center">${mcard(fin)}</div></div>
      <div class="ko-round"><div class="ko-cell-center">${champCard}</div></div>
    </div>`;
  const placementBracket = `
    <div class="ko">
      <div class="ko-round"><div class="ko-pair">
        <div class="ko-cell">${mcard(sf3)}</div>
        <div class="ko-cell">${byeCard}</div>
      </div></div>
      <div class="ko-round"><div class="ko-cell-center">${mcard(fifth,'5th / 6th play-off')}</div></div>
    </div>`;
  const placingsHtml = placings ? `
    <h2 class="section-t">Final placings</h2>
    <p class="section-s">Where every team finished after the play-offs.</p>
    <ol class="placings">${placings.map((t,i)=>`<li class="${/Touch This/.test(t)?'tt':''}"><span class="pp">${i+1}</span><span>${esc(t)}</span></li>`).join('')}</ol>` : '';
  host.innerHTML = `
    <h2 class="section-t">Play-offs &mdash; ${esc(s.name)}</h2>
    <p class="section-s">After six league games, all seven teams were re-seeded by league finish into a knockout: the top four played for the title, the bottom three for final position.</p>
    <div class="card mt">
      <h3>How it works</h3>
      <p class="muted" style="margin:0;font-size:13.5px">Seeds follow the final league table (1 = Scoregasms &hellip; 7 = Touch This). <strong>Championship (top four):</strong> 1 plays 4 and 2 plays 3 in the semis; the winners meet in the final, the losers in the third-place play-off. <strong>Placement (bottom three):</strong> the 5th and 6th seeds play a semi; its winner meets the 7th seed for 5th and 6th, and its loser takes 7th. Win and you move up, lose and you move down, so every team ends on a definite finish.</p>
    </div>

    <h2 class="section-t">Championship &middot; seeds 1 to 4</h2>
    <p class="section-s">Playing for the title.</p>
    ${champBracket}
    <div class="ko-consol">${mcard(bronze,'Third-place play-off')}</div>
    <p class="ko-cap">The two beaten semi-finalists (The Dirty Dogs and Try Hard 2) met for 3rd. Try Hard 2 won it 5 to 3.</p>

    <h2 class="section-t">Placement &middot; seeds 5 to 7</h2>
    <p class="section-s">Playing for final position &mdash; the games that settled Touch This's season.</p>
    ${placementBracket}
    <p class="ko-cap">Touchdown Titans beat Wandsworth Wasps in the semi, so the Wasps finished 7th. Touch This, seeded 7th, had a bye into the 5th/6th play-off and faced the Titans &mdash; their opening-day opponent &mdash; losing 3 to 7 to finish 6th, one place above the Wasps.</p>

    ${placingsHtml}`;
}

      <div class="card"><h3>MVP awards</h3>${barChart(mvps,i=>playerName(i.id),'No MVPs logged yet.')}

    </div>
    <h2 class="section-t">Squad</h2>

function renderStats(){
  const host=$('[data-view="stats"]');
  const games = TT.fixtures.filter(f=>f.played && f.competition!=='bye' && f.ttScore!=null && f.oppScore!=null);
  let w=0,l=0,d=0,tf=0,ta=0;
  games.forEach(f=>{ const r=fxResult(f); if(r==='W')w++; else if(r==='L')l++; else if(r==='D')d++; tf+=f.ttScore; ta+=f.oppScore; });
  const gp=games.length, winPct=gp?Math.round(w/gp*100):0;
  const scorers=tallyScorers('all'), mvps=tallyMvp('all'), unatt=totalUnattributed('all');
  const bestAttack = games.slice().sort((a,b)=> b.ttScore-a.ttScore || (b.ttScore-b.oppScore)-(a.ttScore-a.oppScore))[0];
  const heaviest  = games.slice().sort((a,b)=> (a.ttScore-a.oppScore)-(b.ttScore-b.oppScore))[0];
  const narrowest = games.filter(f=>fxResult(f)==='L').sort((a,b)=> (a.oppScore-a.ttScore)-(b.oppScore-b.ttScore))[0];
  const kpis=[
    ['Games played',gp],['Record (W-L)',`${w}–${l}`],['Win rate',winPct+'%'],
    ['Tries scored',tf],['Tries conceded',ta],['Avg margin', gp?((tf-ta)/gp>0?'+':'')+((tf-ta)/gp).toFixed(1):'–']
  ].map(([lab,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${lab}</div></div>`).join('');
  const recCard=(title,f,extra)=> f
    ? `<div class="card"><h3>${title}</h3>
        <div class="statline"><div class="s"><div class="sv">${f.ttScore}–${f.oppScore}</div><div class="sl">${resBadge(fxResult(f))} vs ${esc(oppName(f.opponent))}</div></div></div>
        <p class="muted" style="margin:2px 0 0;font-size:12.5px">${fmtDate(f.date)}${extra?' · '+extra:''}</p></div>`
    : `<div class="card"><h3>${title}</h3><div class="empty">No games yet.</div></div>`;
  host.innerHTML = `
    <h2 class="section-t">Club stats &mdash; all time</h2>
    <p class="section-s">Across every game played so far, both seasons and the play-offs.</p>
    <div class="kpis">${kpis}</div>
    <h2 class="section-t">Records</h2>
    <div class="grid g3">
      ${recCard('Best attacking game', bestAttack, bestAttack?bestAttack.ttScore+' tries scored':'')}
      ${recCard('Narrowest defeat', narrowest, narrowest?'lost by '+(narrowest.oppScore-narrowest.ttScore):'')}
      ${recCard('Heaviest defeat', heaviest, heaviest?'lost by '+(heaviest.oppScore-heaviest.ttScore):'')}
    </div>
    <h2 class="section-t">All-time leaderboards</h2>
    <div class="grid g2">
      <div class="card"><h3>Top try scorers</h3>${barChart(scorers,i=>playerName(i.id),'No try scorers yet.')}${unatt?`<p class="muted" style="margin:11px 0 0;font-size:12.5px">Plus ${unatt} unattributed tries.</p>`:''}</div>
      <div class="card"><h3>Most MVP awards</h3>${barChart(mvps,i=>playerName(i.id),'No MVPs yet.')}</div>
    </div>
    <h2 class="section-t">By the numbers</h2>
    <div class="card"><ul class="facts">
      <li><strong>${gp}</strong> games played &mdash; ${w} won, ${l} lost</li>
      <li><strong>${tf}</strong> tries scored, <strong>${ta}</strong> conceded (${(tf-ta)>0?'+':''}${tf-ta} difference)</li>
      <li><strong>${scorers.length}</strong> different try scorers, <strong>${mvps.length}</strong> different MVP winners</li>
      <li><strong>${TT.players.length}</strong> players turned out across the club</li>
      <li>Leading scorer: <strong>${scorers.length?esc(playerName(scorers[0].id))+' ('+scorers[0].n+' tries)':'—'}</strong></li>
    </ul></div>`;
}

function renderOpponent(id){
  const host=$('[data-view="opponent"]'); const o=opp(id);
  if(!o){ host.innerHTML=`<a class="back" href="#fixtures">&larr; Back</a><div class="empty">Unknown opponent.</div>`; return; }
  const h=headToHead(id);
  const kpis=[
    ['Played', h.played.length],
    ['Record (W-L)', `${h.w}–${h.l}`],
    ['Tries for', withUnknown(h.tf,h.tfU)],
    ['Tries against', withUnknown(h.ta,h.taU)]
  ].map(([l,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');

  const meetings = h.played.map(f=>`
    <tr>
      <td>${fmtDate(f.date)}</td><td>${compPill(f)}</td>
      <td class="num">${scoreText(f)}</td><td class="num">${resBadge(fxResult(f))}</td>
      <td>${scorersText(f)}</td><td>${mvpText(f)}</td>
    </tr>`).join('') || `<tr><td colspan="6"><div class="empty">No completed meetings yet.</div></td></tr>`;

  const up = h.upcoming.length ? `
    <div class="card hero-card mt">
      <div class="wm">${crestSVG()}</div>
      <p class="lead">Next meeting</p>
      <p class="big">${fmtDate(h.upcoming[0].date)}${h.upcoming[0].time?' · '+esc(h.upcoming[0].time):''}</p>
      <p class="story">${h.upcoming[0].competition==='playoff'?'Play-off. ':''}${esc(season(h.upcoming[0].season).name)}${h.upcoming[0].week?', week '+h.upcoming[0].week:''}${h.upcoming[0].venue?' · '+esc(h.upcoming[0].venue):''}.</p>
    </div>` : '';

  host.innerHTML = `
    <a class="back" href="#fixtures">&larr; All fixtures</a>
    <h2 class="section-t">${esc(o.name)}</h2>
    <p class="section-s">${o.finish?`Finished ${ordinal(o.finish)} in Early Summer 2026. `:''}${o.notes?esc(o.notes):'Head-to-head record and previous meetings.'}</p>
    <div class="kpis" style="grid-template-columns:repeat(4,1fr)">${kpis}</div>
    ${up}
    <h2 class="section-t">Previous meetings</h2>
    <div class="tablewrap"><table>
      <thead><tr><th>Date</th><th>Comp</th><th class="num">Score</th><th class="num">Res</th><th>Try scorers</th><th>MVP</th></tr></thead>
      <tbody>${meetings}</tbody>
    </table></div>`;
}

/* ---------- router + boot ---------- */
const VIEWS=['home','fixtures','table','playoffs','players','stats'];
function renderAll(){ renderHome(); renderFixtures(); renderTable(); renderPlayoffs(); renderPlayers(); renderStats(); }
function route(){
  const [view,arg]=(location.hash.replace(/^#/,'')||'home').split('/');
  const v = view==='opponent' ? 'opponent' : (VIEWS.includes(view)?view:'home');
  $$('[data-view]').forEach(sec=>sec.hidden = sec.dataset.view!==v);
  $$('#seg button').forEach(b=>b.classList.toggle('active', b.dataset.nav===v));
  if(v==='opponent') renderOpponent(arg);
  window.scrollTo(0,0);
}

function boot(){
  // crest
  $('#crest').innerHTML=crestSVG();
  // season toggle
  curSeason = (TT.seasons.find(s=>s.status==='active')||TT.seasons[0]).id;
  const sseg=$('#season-seg');
  sseg.innerHTML = TT.seasons.map(s=>`<button data-season="${s.id}">${esc(s.name.replace(/\s*20\d\d/,''))}</button>`).join('');
  const syncSeason=()=>$$('#season-seg button').forEach(b=>b.classList.toggle('active', b.dataset.season===curSeason));
  $$('#season-seg button').forEach(b=>b.addEventListener('click',()=>{ curSeason=b.dataset.season; syncSeason(); renderAll(); route(); }));
  syncSeason();
  // nav
  $$('#seg button').forEach(b=>b.addEventListener('click',()=>{ location.hash='#'+b.dataset.nav; }));

  renderAll();
  window.addEventListener('hashchange',route);
  route();
}
boot();
</script>
</body>
</html>
