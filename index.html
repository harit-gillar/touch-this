<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#faf7f2" />
<meta name="color-scheme" content="light" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M8 4h48v30c0 13-10 22-24 28C18 56 8 47 8 34Z' fill='%236e2334'/%3E%3Cpath d='M11 7h42v27c0 11-9 19-21 25C20 53 11 45 11 34Z' fill='none' stroke='%23f2ead3' stroke-width='2'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='21' fill='%23f2ead3'%3ETT%3C/text%3E%3C/svg%3E" />
<title>Touch This — Team Dashboard</title>
<style>
  :root{
    --bg:#faf7f2; --panel:#ffffff; --panel-2:#fbf8f4; --ink:#1c1418; --muted:#8a7d80;
    --line:#eadfd4; --accent:#6e2334; --accent-soft:#9a4453; --cream:#f0e6cf;
    --win:#3f9d6d; --loss:#b0546b; --draw:#c8912f; --pending:#8a7d80;
    --shadow:0 1px 2px rgba(60,20,30,.05),0 6px 22px rgba(60,20,30,.06);
    --radius:16px;
    --kline:#c9b9a6;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 20px 70px}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .muted{color:var(--muted)}
  h1,h2,h3{letter-spacing:-.02em}

  /* Hero */
  .hero{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .hero .crest{width:56px;height:62px;flex:none}
  .hero h1{margin:0;line-height:0}
  .hero h1 svg{height:30px;width:auto;display:block}
  .hero .motto{margin:2px 0 0;color:var(--accent-soft);font-style:italic;font-size:14px}
  .hero .sub{margin:2px 0 0;color:var(--muted);font-size:13px}
  select{font:inherit;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 11px;cursor:pointer}
  .icon-btn{width:38px;height:38px;border:1px solid var(--line);background:var(--panel);border-radius:10px;
    cursor:pointer;color:var(--muted);font-size:16px;display:inline-flex;align-items:center;justify-content:center}
  .icon-btn:hover{color:var(--ink)}

  /* Segmented nav */
  .nav{margin:22px 0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .seg{display:inline-flex;background:color-mix(in srgb,var(--accent) 7%, var(--panel));
    border:1px solid var(--line);border-radius:13px;padding:4px;gap:2px}
  .seg button{border:none;background:transparent;color:var(--muted);font:inherit;font-weight:550;font-size:13.5px;
    padding:8px 17px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:background .18s,color .18s}
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--panel);color:var(--accent);box-shadow:var(--shadow)}
  #seg button{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 15px;font-size:12px;font-weight:500;line-height:1}
  #seg button svg{width:19px;height:19px;flex:none}
  .fx-controls{display:flex;flex-wrap:wrap;align-items:center;gap:12px 22px;margin-bottom:16px}
  .fx-ctl{display:flex;align-items:center;gap:8px}
  .fx-ctl-lab{font-size:12px;color:var(--muted)}

  /* Cards + grid */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 14px;font-size:11.5px;font-weight:650;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .mt{margin-top:16px}
  .section-t{margin:34px 0 4px;font-size:19px;font-weight:640}
  .section-s{margin:0 0 14px;color:var(--muted);font-size:13.5px}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--shadow)}
  .kpi .v{font-size:23px;font-weight:680;letter-spacing:-.03em}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.3}

  /* Hero standing strip */
  .hero-card{background:color-mix(in srgb,var(--accent) 5%,var(--panel));
    border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);
    margin-top:18px}
  .hero-card .wm{display:none}
  .hero-card .lead{font-size:14px;color:var(--muted);margin:0 0 6px}
  .hero-card .big{font-size:22px;font-weight:660;margin:0}
  .hero-card .story{margin:10px 0 0;max-width:640px;font-size:13.5px;color:var(--ink)}

  /* Next fixture */
  .next{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .next .vs{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .next .opp{font-size:20px;font-weight:640;margin:2px 0 0}
  .next .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .next .cta{margin-left:auto}

  /* Form chips */
  .form{display:flex;gap:6px;align-items:center}
  .chip{width:26px;height:26px;border-radius:8px;font-size:12px;font-weight:650;
    display:inline-flex;align-items:center;justify-content:center}
  .chip.w{background:color-mix(in srgb,var(--win) 20%,transparent);color:var(--win)}
  .chip.l{background:color-mix(in srgb,var(--loss) 20%,transparent);color:var(--loss)}
  .chip.d{background:color-mix(in srgb,var(--draw) 22%,transparent);color:var(--draw)}
  .chip.tbd{background:var(--line);color:var(--muted)}

  /* Tables */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;background:var(--panel)}
  th,td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;white-space:nowrap}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);user-select:none}
  th.sortable{cursor:pointer}
  th.sortable:hover{color:var(--ink)}
  th .arrow{opacity:.5;font-size:9px;margin-left:2px}
  td.num,th.num{text-align:center;font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.clickable{cursor:pointer}
  tbody tr.clickable:hover{background:var(--panel-2)}
  tbody tr:hover:not(.clickable):not(.hl){background:color-mix(in srgb,var(--accent) 3%,transparent)}
  @media (max-width:760px){
    .col-detail,.col-season{display:none}
    .tablewrap th,.tablewrap td{padding:9px 10px}
    td.col-opp{white-space:normal;min-width:92px}
  }
  @media (max-width:480px){ .col-comp{display:none} }
  .hl{background:color-mix(in srgb,var(--accent) 6%,var(--panel))}
  td.cmp-us,th.cmp-us{background:color-mix(in srgb,var(--accent) 8%,transparent)}
  th.cmp-us{color:var(--accent)}

  /* Pills / result badges */
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;line-height:1.6;white-space:nowrap;
    background:var(--line);color:var(--muted)}
  .pill.league{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent)}
  .pill.playoff{background:color-mix(in srgb,var(--draw) 22%,transparent);color:var(--draw)}
  .pill.up{background:color-mix(in srgb,var(--pending) 18%,transparent);color:var(--muted)}
  .res{display:inline-flex;min-width:24px;height:24px;padding:0 6px;border-radius:7px;font-size:11.5px;font-weight:650;
    align-items:center;justify-content:center}
  .res.w{background:color-mix(in srgb,var(--win) 18%,transparent);color:var(--win)}
  .res.l{background:color-mix(in srgb,var(--loss) 18%,transparent);color:var(--loss)}
  .res.d{background:color-mix(in srgb,var(--draw) 20%,transparent);color:var(--draw)}
  .res.tbd{background:var(--line);color:var(--muted)}

  /* Bar leaderboard */
  .bar-row{display:flex;align-items:center;gap:12px;margin:9px 0}
  .bar-row .name{width:130px;flex:none;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;background:var(--line);border-radius:7px;height:20px;overflow:hidden}
  .bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent),var(--accent-soft));
    min-width:3px;transition:width .3s ease}
  .bar-row .val{width:38px;flex:none;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:var(--muted)}
  .att-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--win);vertical-align:middle;margin-right:3px}
  .att-dot.off{background:transparent;border:1.5px solid color-mix(in srgb,var(--muted) 45%,var(--line));width:9px;height:9px}
  .card.pl-rows{padding:4px 16px 6px}
  .pl-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .pl-row:last-child{border-bottom:none}
  .pl-av{width:32px;height:32px;border-radius:50%;background:color-mix(in srgb,var(--accent) 10%,var(--panel));color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex:none}
  .pl-av-gold{background:color-mix(in srgb,var(--draw) 16%,var(--panel));color:color-mix(in srgb,var(--draw) 75%,var(--ink))}
  .pl-name{font-size:14px;font-weight:550;color:var(--ink)}
  .pl-flag{font-size:13.5px;margin-left:6px}
  .pl-nick{font-size:13px;font-weight:400;color:var(--muted)}
  .pl-sub{font-size:12px;color:var(--muted)}
  .pl-count{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;width:34px;text-align:right;flex:none}
  .pl-ghead{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;padding:12px 0 3px}
  .mvp-row{padding:11px 0;border-bottom:1px solid var(--line)}
  .mvp-row:last-child{border-bottom:none}
  .mvp-why{font-size:13.5px;font-style:italic;color:var(--ink);margin:5px 0 0 43px;line-height:1.45}
  .thin .bar-track{height:7px;border-radius:4px}
  .thin .bar-fill{border-radius:4px}

  /* Roster */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .pcard{border:1px solid var(--line);border-radius:13px;padding:13px 15px;background:var(--panel-2);display:flex;gap:12px;align-items:flex-start}
  .avatar{width:38px;height:38px;border-radius:50%;flex:none;background:var(--accent);color:var(--cream);
    display:inline-flex;align-items:center;justify-content:center;font-weight:660;font-size:14px}
  .pcard .pn{font-weight:600;font-size:14px}
  .pcard .pr{font-size:12px;color:var(--muted)}
  .pcard .pstat{font-size:12px;color:var(--accent-soft);margin-top:5px;font-weight:600;font-variant-numeric:tabular-nums}

  /* Bracket */
  .bracket{display:flex;flex-direction:column;gap:14px}
  .bracket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .tie.tie-tt{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent)}
  .placings{list-style:none;padding:0;margin:0;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:var(--panel);max-width:440px;box-shadow:var(--shadow)}
  .placings li{display:flex;gap:12px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);font-size:14px}
  .placings li:last-child{border-bottom:none}
  .placings li.tt{background:color-mix(in srgb,var(--accent) 9%,transparent);font-weight:640}
  .placings .pp{width:20px;color:var(--muted);font-variant-numeric:tabular-nums;text-align:right}
  .ptype{display:inline-block;font-size:9.5px;font-weight:650;letter-spacing:.04em;text-transform:uppercase;padding:1px 6px;border-radius:5px;background:var(--line);color:var(--muted);vertical-align:middle}
  .ptype.core{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
  .ptype.regular{background:color-mix(in srgb,var(--draw) 24%,transparent);color:var(--draw)}
  /* knockout bracket */
  .ko{display:flex;align-items:stretch;overflow-x:auto;padding:10px 2px}
  .ko-round{display:flex;flex-direction:column;flex:0 0 auto;min-width:212px}
  .ko-round:not(:last-child){margin-right:46px}
  .ko-pair{display:flex;flex-direction:column;flex:1;position:relative;min-height:250px}
  .ko-pair > .ko-cell{flex:1;display:flex;align-items:center}
  .ko-cell-center{flex:1;display:flex;align-items:center}
  .ko-m{position:relative;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;box-shadow:var(--shadow)}
  .ko-mh{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 12px 3px}
  .ko-row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px 12px;font-size:13.5px}
  .ko-row + .ko-row{border-top:1px solid var(--line)}
  .ko-row.w{font-weight:660;background:color-mix(in srgb,var(--win) 13%,transparent)}
  .ko-row.ko-me{box-shadow:inset 3px 0 0 var(--accent)}
  .ko-t{display:flex;align-items:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ko-seed{font-style:normal;min-width:15px;color:var(--muted);font-size:11px;margin-right:8px;text-align:center;flex:none}
  .ko-s{font-variant-numeric:tabular-nums;font-weight:600;flex:none}
  .ko-note{font-size:11px;color:var(--muted);padding:3px 12px 9px;line-height:1.45}
  .ko-champ{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent),var(--shadow)}
  .ko-champ .ko-mh{color:var(--accent)}
  .ko-champ-name{padding:6px 12px 12px;font-weight:680;font-size:16px;letter-spacing:-.01em}
  .ko-pair > .ko-cell > .ko-m::after{content:'';position:absolute;left:100%;top:50%;width:20px;height:2px;background:var(--kline)}
  .ko-pair::after{content:'';position:absolute;left:calc(100% + 20px);top:25%;bottom:25%;width:2px;background:var(--kline)}
  .ko-pair::before{content:'';position:absolute;left:calc(100% + 20px);top:50%;width:26px;height:2px;background:var(--kline)}
  .ko-round:not(:last-child) .ko-cell-center > .ko-m::after{content:'';position:absolute;left:100%;top:50%;width:46px;height:2px;background:var(--kline)}
  .ko-consol{margin-top:16px;max-width:290px}
  .ko-cap{color:var(--muted);font-size:12.5px;margin:10px 2px 0;max-width:660px;line-height:1.55}
  /* Gameday Hub overview */
  .gd-hero{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 22px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .gd-hero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .gd-herohead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .gd-kicker{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-soft)}
  .gd-chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--cream);color:var(--accent)}
  .gd-matchline{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px 12px;margin-bottom:16px}
  .gd-us{font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--muted)}
  .gd-vs{font-size:13px;font-weight:600;color:var(--muted)}
  .gd-opp{font-size:27px;font-weight:700;letter-spacing:-.025em;color:var(--ink);line-height:1.05}
  .gd-countdown{display:flex;align-items:baseline;gap:12px;padding:14px 16px;background:var(--bg);border:1px solid var(--line);border-radius:12px;margin-bottom:16px}
  .gd-cdlabel{font-size:12px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
  .gd-cdvalue{font-size:34px;font-weight:720;letter-spacing:-.02em;color:var(--accent);font-variant-numeric:tabular-nums;margin-left:auto;line-height:1}
  .gd-logistics{display:flex;align-items:stretch;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .gd-logitem{display:flex;flex-direction:column;gap:3px;min-width:0}
  .gd-logk{font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
  .gd-logv{font-size:14px;font-weight:600;color:var(--ink)}
  .gd-logdiv{width:1px;align-self:stretch;background:var(--line)}
  .gd-verdict{display:flex;align-items:flex-start;gap:9px;padding:12px 14px;background:var(--cream);border-radius:12px;margin-bottom:18px}
  .gd-vicon{flex:0 0 auto;line-height:0;margin-top:1px}
  .gd-vtext{font-size:13.5px;line-height:1.5;color:var(--accent)}
  .gd-vtext strong{font-weight:700}
  .gd-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .gd-btn{font-size:14px;font-weight:600;border-radius:11px;padding:11px 18px;cursor:pointer;border:1px solid transparent;text-decoration:none;display:inline-block}
  .gd-btn-primary{background:var(--accent);color:var(--cream)}
  .gd-btn-ghost{background:var(--panel);color:var(--accent);border-color:var(--line)}
  .gd-nomatch{color:var(--muted);font-size:14px;margin:8px 0 0}
  .gd-lower{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .gd-panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .gd-panelhead{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:14px}
  .gd-panelk{font-size:12.5px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--ink)}
  .gd-panelsub{font-size:11.5px;font-weight:500;color:var(--muted)}
  .gd-formstrip{display:flex;gap:7px;margin-bottom:9px}
  .gd-pip{flex:1;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:13px;font-weight:700}
  .gd-l{background:color-mix(in srgb,var(--loss) 12%,transparent);color:var(--loss)}
  .gd-w{background:color-mix(in srgb,var(--win) 15%,transparent);color:var(--win)}
  .gd-d{background:color-mix(in srgb,var(--draw) 20%,transparent);color:var(--draw)}
  .gd-plast{box-shadow:inset 0 0 0 1.5px currentColor}
  .gd-formnote{font-size:11px;font-weight:500;color:var(--muted)}
  .gd-formempty{font-size:13px;color:var(--muted);margin:0}
  .gd-lastrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;text-decoration:none;color:inherit}
  .gd-lrbadge{flex:0 0 auto;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
  .gd-lrscore{font-size:24px;font-weight:700;letter-spacing:-.02em;color:var(--ink);font-variant-numeric:tabular-nums;display:inline-flex;align-items:baseline;gap:7px}
  .gd-lrto{font-size:12px;font-weight:600;color:var(--muted)}
  .gd-lropp{font-size:12.5px;font-weight:500;color:var(--muted);margin-left:2px}
  .gd-fulllink{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--accent);text-decoration:none}
  .gd-ribbon{display:flex;align-items:center;gap:9px;margin-top:14px;padding:11px 16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
  .gd-rdot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--accent-soft)}
  .gd-rtext{font-size:12.5px;font-weight:500;color:var(--muted);font-variant-numeric:tabular-nums}
  .gd-rtext strong{font-weight:700;color:var(--accent)}
  .gd-won{background:color-mix(in srgb,var(--win) 10%,var(--panel));border-color:color-mix(in srgb,var(--win) 35%,var(--line))}
  .gd-won .gd-rdot{background:var(--win)}
  @media (max-width:640px){ .gd-lower{grid-template-columns:1fr} .gd-cdvalue{font-size:27px} .gd-opp{font-size:23px} .gd-logdiv{display:none} .gd-logistics{gap:10px 22px} }
  /* match report */
  .report-head{text-align:center;padding:6px 0 2px}
  .rh-meta{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .rh-teams{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}

/* ---------- helpers ---------- */
const $  = s => document.querySelector(s);
const $$ = (s,root=document) => [...root.querySelectorAll(s)];
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byId = (arr,id) => arr.find(x=>x.id===id);
const opp = id => byId(TT.opponents,id);
const player = id => byId(TT.players,id);
const season = id => byId(TT.seasons,id);
const oppName = id => (opp(id)?.name) || 'TBC';
const playerName = id => { const p=player(id); return p ? p.name : id; };
const playerShort = id => { const p=player(id); return p ? (p.nickname||p.name.split(' ')[0]) : id; };
const firstName = id => { const p=player(id); return p ? (p.first || p.name.split(' ')[0]) : id; };
const flagHTML = id => { const p=player(id); return p&&p.flag ? `<span class="pl-flag">${p.flag}</span>` : ''; };
const nickHTML = id => { const p=player(id); return p&&p.nickname && p.nickname!==firstName(id) ? ` <span class="pl-nick">&ldquo;${esc(p.nickname)}&rdquo;</span>` : ''; };
const attDotsHTML = (games, id) => games.map(f=>`<span class="att-dot${f.lineup.includes(id)?'':' off'}" title="${esc(fmtDate(f.date))} vs ${esc(f.opponent?oppName(f.opponent):'TBC')}"></span>`).join('');
const initials = n => n.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const NR = '<span class="muted">Not recorded</span>';

function fmtDate(d){
  if(!d) return 'TBC';
  const dt=new Date(d+'T00:00:00');
  return isNaN(dt)? 'TBC' : dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fxResult(f){
  if(f.result) return f.result;
  if(f.ttScore!=null && f.oppScore!=null)
    return f.ttScore>f.oppScore?'W':f.ttScore<f.oppScore?'L':'D';
  return null;
}
function resBadge(r){
  if(r==='W') return '<span class="res w">W</span>';
  if(r==='L') return '<span class="res l">L</span>';
  if(r==='D') return '<span class="res d">D</span>';
  return '<span class="res tbd">–</span>';
}
function scoreText(f){
  if(!f.played) return '<span class="muted">Upcoming</span>';
  if(f.ttScore==null || f.oppScore==null) return '<span class="muted">TBD</span>';
  return f.ttScore+'&ndash;'+f.oppScore;
}
function compPill(f){
  if(f.competition==='playoff') return '<span class="pill playoff">Play-off</span>';
  if(!f.played) return '<span class="pill up">Upcoming</span>';
  return '<span class="pill league">League</span>';
}
function scorersText(f){
  const un = f.unattributed||0;
  if(f.scorers==null && !un) return NR;
  const named = Array.isArray(f.scorers) ? f.scorers.map(s=>{
    const pid=typeof s==='string'?s:s.player, t=typeof s==='string'?1:(s.tries||1);
    return esc(firstName(pid))+(t>1?' &times;'+t:'');
  }) : [];
  if(un) named.push('<span class="muted">+'+un+' unattributed</span>');
  return named.length ? named.join(', ') : '<span class="muted">&mdash;</span>';
}
function mvpText(f){ return f.mvp ? esc(playerName(f.mvp.player))+' <span class="muted">('+esc(f.mvp.award)+')</span>' : NR; }
function oppLink(id){ return id ? `<a href="#opponent/${id}">${esc(oppName(id))}</a>` : '<span class="muted">TBC</span>'; }

/* ---------- computations (pure over TT.fixtures) ---------- */
function inScope(f,sid){ return sid==='all' || f.season===sid; }

function teamRecord(sid){
  const fx = TT.fixtures.filter(f=>inScope(f,sid) && f.competition==='league' && f.played);
  let w=0,l=0,d=0,tf=0,ta=0,tfU=false,taU=false;
  fx.forEach(f=>{
    const r=fxResult(f);
    if(r==='W')w++; else if(r==='L')l++; else if(r==='D')d++;
    if(f.ttScore!=null) tf+=f.ttScore; else tfU=true;
    if(f.oppScore!=null) ta+=f.oppScore; else taU=true;
  });
  const pts = w*TT.team.rules.points.win + d*(TT.team.rules.points.draw||0) + l*TT.team.rules.points.loss;
  return { played:fx.length, w,l,d, tf,ta, tfU,taU, pts, diff:tf-ta };
}
function bestPerf(sid){
  const fx = TT.fixtures.filter(f=>inScope(f,sid) && f.played && f.ttScore!=null);
  if(!fx.length) return null;
  return fx.slice().sort((a,b)=> b.ttScore-a.ttScore || (b.ttScore-b.oppScore)-(a.ttScore-a.oppScore))[0];
}
function formGuide(sid,n=5){
  return TT.fixtures.filter(f=>inScope(f,sid) && f.competition==='league' && f.played)
    .sort((a,b)=>(a.date||'')<(b.date||'')?-1:1).slice(-n).map(fxResult);
}
function nextFixture(){
  return TT.fixtures.filter(f=>!f.played && f.competition!=='bye')
    .sort((a,b)=>(a.date||'9999-99-99')<(b.date||'9999-99-99')?-1:1)[0] || null;
}
function headToHead(oppId){
  const all = TT.fixtures.filter(f=>f.opponent===oppId)
    .sort((a,b)=>(a.date||'9999')<(b.date||'9999')?-1:1);
  const played = all.filter(f=>f.played);
  let w=0,l=0,d=0,tf=0,ta=0,tfU=false,taU=false;
  played.forEach(f=>{
    const r=fxResult(f);
    if(r==='W')w++; else if(r==='L')l++; else if(r==='D')d++;
    if(f.ttScore!=null) tf+=f.ttScore; else tfU=true;
    if(f.oppScore!=null) ta+=f.oppScore; else taU=true;
  });
  return { all, played, upcoming:all.filter(f=>!f.played), w,l,d, tf,ta, tfU,taU };
}
function tallyScorers(sid){
  const m={};
  TT.fixtures.filter(f=>inScope(f,sid) && Array.isArray(f.scorers)).forEach(f=>{
    f.scorers.forEach(s=>{ const pid=typeof s==='string'?s:s.player, t=typeof s==='string'?1:(s.tries||1); m[pid]=(m[pid]||0)+t; });
  });
  return Object.entries(m).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n);
}
function tallyMvp(sid){
  const m={};
  TT.fixtures.filter(f=>inScope(f,sid) && f.mvp && f.mvp.player).forEach(f=>{ m[f.mvp.player]=(m[f.mvp.player]||0)+1; });
  return Object.entries(m).map(([id,n])=>({id,n})).sort((a,b)=>b.n-a.n);
}
function totalUnattributed(sid){
  return TT.fixtures.filter(f=>inScope(f,sid)).reduce((s,f)=>s+(f.unattributed||0),0);
}
function withUnknown(n,unknown){ return unknown ? (n+'+') : String(n); }

/* ---------- bar leaderboard ---------- */
function barChart(items, nameFn, emptyMsg){
  if(!items.length) return `<div class="empty">${esc(emptyMsg)}</div>`;
  const max = Math.max(...items.map(i=>i.n));
  return items.map(i=>`
    <div class="bar-row">

}

/* ---------- inline SVG charts (no libraries; labels live in an HTML flex row so they stay
   at CSS pixel size on phones; values in <title> tooltips; fills use CSS variables) ---------- */
const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
const seasonInitials = sid => (season(sid)?.name||String(sid)).split(/\s+/).filter(w=>!/\d/.test(w)).map(w=>w[0]).join('').toUpperCase();
const gameLabel = (f, withSeason) => (withSeason ? seasonInitials(f.season)+' ' : '') + (f.week ? 'W'+f.week : 'PO');
function chartGames(scope){
  return TT.fixtures.filter(f=>f.played && f.competition!=='bye' && f.ttScore!=null && f.oppScore!=null && inScope(f,scope))
    .sort((a,b)=>(a.date||'')<(b.date||'')?-1:1);
}
const chartXRow = labels => `<div class="chart-x">${labels.map(l=>`<span>${esc(l)}</span>`).join('')}</div>`;

function marginChartHTML(scope){
  const games = chartGames(scope);
  if(!games.length) return '<div class="empty">No games played in this scope yet.</div>';
  const withS = scope==='all';
  const M = Math.max(3, ...games.map(f=>Math.abs(f.ttScore-f.oppScore)));
  const slot = 560/games.length, bw = Math.min(34, slot*0.55);
  const bars = games.map((f,i)=>{
    const m = f.ttScore-f.oppScore, h = Math.round(Math.abs(m)/M*63);
    const x = (i*slot + (slot-bw)/2).toFixed(1);
    const word = m>0?'won':m<0?'lost':'drew';
    const tip = `${gameLabel(f,withS)} vs ${oppName(f.opponent)||'TBC'}: ${word} ${f.ttScore} to ${f.oppScore}`;
    if(m===0) return `<circle cx="${(i*slot+slot/2).toFixed(1)}" cy="75" r="4" fill="var(--draw)"><title>${esc(tip)}</title></circle>`;
    return `<rect x="${x}" y="${m>0?75-h:75}" width="${bw.toFixed(1)}" height="${Math.max(h,2)}" rx="2" fill="${m>0?'var(--win)':'var(--loss)'}"><title>${esc(tip)}</title></rect>`;
  }).join('');
  return `<svg viewBox="0 0 560 150" role="img" aria-label="Winning margin per game">
    <line x1="0" y1="75" x2="560" y2="75" stroke="var(--line)" stroke-width="1.5"/>${bars}</svg>
    ${chartXRow(games.map(f=>gameLabel(f,withS)))}
    <div class="chart-legend"><span><span class="sw" style="background:var(--win)"></span>Won by</span><span><span class="sw" style="background:var(--loss)"></span>Lost by</span><span><span class="sw" style="background:var(--draw);border-radius:50%"></span>Draw</span></div>`;
}

function triesChartHTML(scope){
  const games = chartGames(scope);
  if(!games.length) return '<div class="empty">No games played in this scope yet.</div>';
  const withS = scope==='all';
  const ymax = Math.max(1, ...games.flatMap(f=>[f.ttScore,f.oppScore]));
  const slot = 560/games.length, bw = Math.min(20, slot*0.35-2);
  const bars = games.map((f,i)=>{
    const c = i*slot + slot/2;
    const mk = (v,x,fill,lab)=>{
      const h = Math.max(2, Math.round(v/ymax*130));
      return `<rect x="${x.toFixed(1)}" y="${146-h}" width="${bw.toFixed(1)}" height="${h}" rx="2" fill="${fill}"${v===0?' opacity="0.45"':''}><title>${esc(`${gameLabel(f,withS)} vs ${oppName(f.opponent)||'TBC'}: ${v} ${lab}`)}</title></rect>`;
    };
    return mk(f.ttScore, c-bw-1, 'var(--accent)', 'tries scored') + mk(f.oppScore, c+1, 'color-mix(in srgb,var(--muted) 45%,var(--line))', 'conceded');
  }).join('');
  return `<svg viewBox="0 0 560 160" role="img" aria-label="Tries for and against per game">
    <line x1="0" y1="146" x2="560" y2="146" stroke="var(--line)" stroke-width="1.5"/>${bars}</svg>
    ${chartXRow(games.map(f=>gameLabel(f,withS)))}
    <div class="chart-legend"><span><span class="sw" style="background:var(--accent)"></span>Tries for</span><span><span class="sw" style="background:color-mix(in srgb,var(--muted) 45%,var(--line))"></span>Tries against</span></div>`;
}

function positionChartHTML(sid){
  const rounds = (TT.results&&TT.results[sid])||[];
  if(!rounds.length) return '';
  const positions = [];
  let nTeams = 0;
  for(let k=1;k<=rounds.length;k++){
    const rows = computeStandings(sid, k);
    if(!rows.length) return '';
    nTeams = rows.length;
    const tt = rows.find(r=>r.tt);
    if(!tt) return '';
    positions.push(tt.pos);
  }
  const y = pos => nTeams>1 ? 14 + (pos-1)/(nTeams-1)*122 : 75;
  const slot = 560/positions.length;
  const grid = Array.from({length:nTeams},(_,i)=>`<line x1="0" y1="${y(i+1).toFixed(1)}" x2="560" y2="${y(i+1).toFixed(1)}" stroke="var(--line)" stroke-width="0.75"/>`).join('');
  const pts = positions.map((p,i)=>[( (i+0.5)*slot ).toFixed(1), y(p).toFixed(1), p]);
  const line = pts.length>1 ? `<polyline points="${pts.map(([x,py])=>x+','+py).join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>` : '';
  const dots = pts.map(([x,py,p],i)=>`<g><circle cx="${x}" cy="${py}" r="9" fill="var(--accent)"><title>${esc(`After week ${i+1}: ${ordinal(p)} of ${nTeams}`)}</title></circle><text x="${x}" y="${(+py+3.5).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--cream)" pointer-events="none">${p}</text></g>`).join('');
  return `<svg viewBox="0 0 560 150" role="img" aria-label="League position after each week">${grid}${line}${dots}</svg>
    ${chartXRow(positions.map((_,i)=>'W'+(i+1)))}
    <p class="chart-cap">1st at the top, ${ordinal(nTeams)} at the bottom.</p>`;
}

function attendanceChartHTML(scope){
  const games = TT.fixtures.filter(f=>inScope(f,scope) && f.played && Array.isArray(f.lineup))
    .sort((a,b)=>(a.date||'')<(b.date||'')?-1:1);
  if(!games.length) return '';
  const withS = scope==='all';
  const counts = games.map(f=>f.lineup.length);
  const ymax = Math.max(...counts);
  const avg = counts.reduce((s,n)=>s+n,0)/counts.length;
  const slot = 560/games.length, bw = Math.min(34, slot*0.55);
  const bars = games.map((f,i)=>{
    const h = Math.max(2, Math.round(counts[i]/ymax*112));
    return `<rect x="${(i*slot+(slot-bw)/2).toFixed(1)}" y="${128-h}" width="${bw.toFixed(1)}" height="${h}" rx="2" fill="var(--accent)"><title>${esc(`${gameLabel(f,withS)} vs ${oppName(f.opponent)||'TBC'}: ${counts[i]} played`)}</title></rect>`;
  }).join('');
  const avgY = (128 - avg/ymax*112).toFixed(1);
  return `<div class="chart-x chart-v">${counts.map(n=>`<span>${n}</span>`).join('')}</div>
    <svg viewBox="0 0 560 140" role="img" aria-label="Players per game">
    <line x1="0" y1="128" x2="560" y2="128" stroke="var(--line)" stroke-width="1.5"/>${bars}
    <line x1="0" y1="${avgY}" x2="560" y2="${avgY}" stroke="var(--draw)" stroke-width="1.5" stroke-dasharray="5 4"><title>${esc(`Average ${avg.toFixed(1)} players`)}</title></line></svg>
    ${chartXRow(games.map(f=>gameLabel(f,withS)))}
    <p class="chart-cap">Dashed line shows the average: ${avg.toFixed(1)} players a game.</p>`;
}

function firstGame(){

    .sort((a,b)=>((a.date||'')<(b.date||'')?-1:1))[0]||null;

function droughtParts(ms){
  const t=Math.floor(Math.max(0,ms)/1000);
  return {days:Math.floor(t/86400), hrs:Math.floor(t%86400/3600), mins:Math.floor(t%3600/60), secs:t%60};
}
function firstWinCompact(){ const s=firstGameMs(), d=droughtParts(s?Date.now()-s:0); return `${d.days}d ${d.hrs}h ${d.mins}m`; }
function firstWinRibbonHTML(){
  const win=firstWinFixture();
  if(win) return `<div class="gd-ribbon gd-won"><span class="gd-rdot"></span><span class="gd-rtext">First win landed &middot; <strong>beat ${esc(oppName(win.opponent))} ${win.ttScore}&ndash;${win.oppScore}</strong> on ${fmtDate(win.date)}</span></div>`;
  return `<div class="gd-ribbon"><span class="gd-rdot"></span><span class="gd-rtext">Still chasing the first win &middot; <strong id="gd-drought">${firstWinCompact()}</strong> since game one</span></div>`;
}
function kickoffMs(f){ return (f&&f.date)? new Date(f.date+'T'+(f.time||'19:00')+':00').getTime() : null; }
function countdownStr(f){
  const k=kickoffMs(f); if(!k) return 'TBC';
  const diff=k-Date.now();
  if(diff<=0) return 'Today';
  const p=droughtParts(diff), pad=n=>String(n).padStart(2,'0');
  return (p.days>0?p.days+'d ':'')+pad(p.hrs)+':'+pad(p.mins)+':'+pad(p.secs);
}
function h2hVerdict(oppId){
  if(!oppId) return 'Opponent to be confirmed.';
  const o=opp(oppId), h=headToHead(oppId);
  const finishBit=(o&&o.finish)?` They finished ${ordinal(o.finish)} last season.`:'';
  if(!h.played.length) return `First ever meeting with ${esc(o?o.name:'them')}.${finishBit}`;
  const n=h.played.length;
  let rec;
  if(h.w===n) rec = n===1?'Beat them last time':(n===2?'Won both meetings':`Won all ${n}`);
  else if(h.l===n) rec = n===1?'Lost the only meeting':(n===2?'Lost both meetings':`Lost all ${n}`);
  else if(h.d===n) rec = n===1?'Drew the only meeting':(n===2?'Drew both meetings':`Drew all ${n}`);
  else rec = `${h.w} win${h.w===1?'':'s'}, ${h.d>0?`${h.d} draw${h.d===1?'':'s'}, `:''}${h.l} loss${h.l===1?'':'es'} in ${n} meetings`;
  const scores=h.played.filter(f=>f.ttScore!=null&&f.oppScore!=null).map(f=>f.ttScore+'-'+f.oppScore);
  let sc='';
  if(scores.length && scores.every(x=>x===scores[0])) sc=`, ${h.played[0].ttScore} to ${h.played[0].oppScore} each`;
  else if(scores.length) sc=`, ${withUnknown(h.tf,h.tfU)} tries to ${withUnknown(h.ta,h.taU)}`;
  return `${rec}${sc}.${finishBit}`;
}

  $$('.fx-season-seg button',host).forEach(b=>b.addEventListener('click',()=>{fxState.season=b.dataset.season;renderFixtures();}));

  $$('[data-view="fixtures"] th.sortable').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.sort;
    if(fxState.key===k) fxState.dir*=-1; else {fxState.key=k;fxState.dir=1;}
    renderFixtures();
  }));
}
const fxState = { season:(TT.seasons.find(s=>s.status==='active')||TT.seasons[0]).id, comp:'all', key:'date', dir:1 };
function sortFixtures(rows){
  const k=fxState.key, d=fxState.dir;
  const val=f=> k==='date'?(f.date||'9999-99-99')
            : k==='opponent'?(oppName(f.opponent)||'')
            : k==='score'?(f.ttScore==null?-1:f.ttScore)
            : k==='result'?({W:3,D:2,L:1}[fxResult(f)]||0):0;
  return rows.slice().sort((a,b)=>{ const x=val(a),y=val(b); return (x<y?-1:x>y?1:0)*d; });
}

// Live standings computed from the round-by-round results grid.
function computeStandings(sid, uptoRound){
  const teams=(TT.standings[sid]||[]).map(r=>r.team);
  const rec={}; teams.forEach(t=>rec[t]={team:t,p:0,w:0,l:0,d:0,tf:0,ta:0,tt:/Touch This/.test(t)});
  const rounds=((TT.results&&TT.results[sid])||[]);
  (uptoRound==null ? rounds : rounds.slice(0, uptoRound)).forEach(rnd=>{
    (rnd.games||[]).forEach(g=>{
      [[g.a,g.as,g.bs],[g.b,g.bs,g.as]].forEach(([t,gf,ga])=>{
        const r=rec[t]; if(!r) return;
        r.p++; r.tf+=gf; r.ta+=ga;
        if(gf>ga)r.w++; else if(gf<ga)r.l++; else r.d++;
      });
    });
  });
  const rows=Object.values(rec);
  rows.forEach(r=>{ r.pts=r.w*TT.team.rules.points.win + r.d*(TT.team.rules.points.draw||0) + r.l*TT.team.rules.points.loss; });
  rows.sort((a,b)=> b.pts-a.pts || (b.tf-b.ta)-(a.tf-a.ta) || b.tf-a.tf || a.team.localeCompare(b.team));
  rows.forEach((r,i)=>r.pos=i+1);
  return rows;
}

function renderStats(){
  const host=$('[data-view="stats"]');
  const sc = statsScope;
  const allTime = sc==='all';
  const scopeSeason = allTime ? null : season(sc);
  const scopeShort = allTime ? 'All time' : (scopeSeason?scopeSeason.name.replace(/\s*20\d\d/,''):'');
  const games = TT.fixtures.filter(f=>f.played && f.competition!=='bye' && f.ttScore!=null && f.oppScore!=null && inScope(f,sc));
  let w=0,l=0,d=0,tf=0,ta=0;
  games.forEach(f=>{ const r=fxResult(f); if(r==='W')w++; else if(r==='L')l++; else if(r==='D')d++; tf+=f.ttScore; ta+=f.oppScore; });
  const gp=games.length, winPct=gp?Math.round(w/gp*100):0;
  const scorers=tallyScorers(sc), mvps=tallyMvp(sc), unatt=totalUnattributed(sc);
  const bestAttack = games.slice().sort((a,b)=> b.ttScore-a.ttScore || (b.ttScore-b.oppScore)-(a.ttScore-a.oppScore))[0];
  const heaviest  = games.slice().sort((a,b)=> (a.ttScore-a.oppScore)-(b.ttScore-b.oppScore))[0];
  const narrowest = games.filter(f=>fxResult(f)==='L').sort((a,b)=> (a.oppScore-a.ttScore)-(b.oppScore-b.ttScore))[0];
  const kpis=[
    ['Games played',gp],[d>0?'Record (W-D-L)':'Record (W-L)', d>0?`${w}–${d}–${l}`:`${w}–${l}`],['Win rate',winPct+'%'],
    ['Tries scored',tf],['Tries conceded',ta],['Avg margin', gp?((tf-ta)/gp>0?'+':'')+((tf-ta)/gp).toFixed(1):'–']
  ].map(([lab,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${lab}</div></div>`).join('');
  const recCard=(title,f,extra)=> f
    ? `<div class="card"><h3>${title}</h3>
        <div class="statline"><div class="s"><div class="sv">${f.ttScore}–${f.oppScore}</div><div class="sl">${resBadge(fxResult(f))} vs ${esc(oppName(f.opponent))}</div></div></div>
        <p class="muted" style="margin:2px 0 0;font-size:12.5px">${fmtDate(f.date)}${extra?' · '+extra:''}</p></div>`
    : `<div class="card"><h3>${title}</h3><div class="empty">No games yet.</div></div>`;
  const scopeBtns = [['all','All time'], ...TT.seasons.map(s=>[s.id, s.name.replace(/\s*20\d\d/,'')])]
    .map(([id,lab])=>`<button data-scope="${id}"${id===sc?' class="active"':''}>${esc(lab)}</button>`).join('');
  const oppCounts={};
  games.forEach(f=>{ if(f.opponent) oppCounts[f.opponent]=(oppCounts[f.opponent]||0)+1; });
  const mostFaced = Object.entries(oppCounts).sort((a,b)=> b[1]-a[1] || oppName(a[0]).localeCompare(oppName(b[0])))[0];
  const oppsFaced = Object.keys(oppCounts).length;
  const appCount={};
  TT.fixtures.filter(f=>f.played && Array.isArray(f.lineup) && inScope(f,sc)).forEach(f=>f.lineup.forEach(pid=>appCount[pid]=(appCount[pid]||0)+1));
  const maxApp = Math.max(0, ...Object.values(appCount));
  const topApp = Object.keys(appCount).filter(id=>appCount[id]===maxApp).map(firstName).sort();
  const joinNames = a => a.length<=1 ? (a[0]||'') : a.slice(0,-1).join(', ')+' and '+a[a.length-1];
  const facts=[
    `<li><strong>${gp}</strong> games played &mdash; ${w} won, ${d>0?d+' drawn, ':''}${l} lost</li>`,
    `<li><strong>${tf}</strong> tries scored, <strong>${ta}</strong> conceded (${(tf-ta)>0?'+':''}${tf-ta} difference)</li>`,
    gp?`<li>Averaged <strong>${(tf/gp).toFixed(1)}</strong> tries scored and <strong>${(ta/gp).toFixed(1)}</strong> conceded per game</li>`:'',
    mostFaced?`<li>Most played opponent: <strong>${esc(oppName(mostFaced[0]))}</strong> (${mostFaced[1]} meeting${mostFaced[1]===1?'':'s'})</li>`:'',
    oppsFaced?`<li><strong>${oppsFaced}</strong> different opponents faced</li>`:'',
    `<li><strong>${scorers.length}</strong> different try scorers, <strong>${mvps.length}</strong> different MVP winners</li>`,
    allTime?`<li><strong>${TT.players.length}</strong> players turned out across the club</li>`:'',
    maxApp?`<li>Most appearances: <strong>${topApp.length>3?topApp.length+' players':esc(joinNames(topApp))}</strong> (${maxApp} game${maxApp===1?'':'s'}${topApp.length>1?' each':''})</li>`:'',
    `<li>Leading scorer: <strong>${scorers.length?esc(firstName(scorers[0].id))+' ('+scorers[0].n+' tries)':'—'}</strong></li>`
  ].filter(Boolean).join('');
  host.innerHTML = `
    <div class="seg stats-seg" role="tablist" aria-label="Stats period" style="margin-bottom:16px">${scopeBtns}</div>
    <h2 class="section-t">Club stats${allTime?'':' &mdash; '+esc(scopeSeason?scopeSeason.name:sc)}</h2>
    <p class="section-s">${allTime?'Across every game played so far, both seasons and the play-offs.':`Just ${esc(scopeSeason?scopeSeason.name:sc)}, league and play-offs.`}</p>
    <div class="kpis">${kpis}</div>
    <h2 class="section-t">Game by game</h2>
    <p class="section-s">Every played game ${allTime?'across both seasons':'in '+esc(scopeSeason?scopeSeason.name:sc)}, oldest first. Hover a bar for the score.</p>
    <div class="grid g2">
      <div class="card chart"><h3>Margin per game</h3>${marginChartHTML(sc)}</div>
      <div class="card chart"><h3>Tries for and against</h3>${triesChartHTML(sc)}</div>
    </div>
    <h2 class="section-t">Records</h2>
    <div class="grid g3">
      ${recCard('Best attacking game', bestAttack, bestAttack?bestAttack.ttScore+' tries scored':'')}
      ${recCard('Narrowest defeat', narrowest, narrowest?'lost by '+(narrowest.oppScore-narrowest.ttScore):'')}
      ${recCard('Heaviest defeat', heaviest, heaviest?'lost by '+(heaviest.oppScore-heaviest.ttScore):'')}
    </div>
    <h2 class="section-t">${allTime?'Leaderboards':esc(scopeShort)+' leaderboards'}</h2>
    <div class="grid g2">
      <div class="card"><h3>Top try scorers</h3>${barChart(scorers,i=>firstName(i.id),'No try scorers yet.')}${unatt?`<p class="muted" style="margin:11px 0 0;font-size:12.5px">Plus ${unatt} unattributed tries.</p>`:''}</div>
      <div class="card"><h3>Most MVP awards</h3>${barChart(mvps,i=>firstName(i.id),'No MVPs yet.')}</div>
    </div>
    <h2 class="section-t">By the numbers</h2>
    <div class="card"><ul class="facts">${facts}</ul></div>`;
  $$('.stats-seg button',host).forEach(b=>b.addEventListener('click',()=>{ statsScope=b.dataset.scope; renderStats(); }));
}

function teamSeasonResults(name, sid){
  const rounds=(TT.results&&TT.results[sid])||[];
  const out=[];
  rounds.forEach(r=>{
    if(r.bye===name){ out.push({date:r.date,bye:true}); return; }
    const g=r.games.find(x=>x.a===name||x.b===name);
    if(!g) return;
    const home=g.a===name, gf=home?g.as:g.bs, ga=home?g.bs:g.as, opp=home?g.b:g.a;
    out.push({date:r.date,opp,gf,ga,res:gf>ga?'W':gf<ga?'L':'D'});
  });
  return out;
}
// All of a team's completed league games grouped by opponent name, across every season in the results grid.
function resultsByOpponentAllSeasons(teamName){
  const map={};
  Object.keys(TT.results||{}).forEach(sid=>{
    teamSeasonResults(teamName, sid).forEach(x=>{
      if(x.bye) return;
      (map[x.opp]=map[x.opp]||[]).push({sid, date:x.date, gf:x.gf, ga:x.ga, res:x.res});
    });
  });
  return map;
}
// The name Touch This is stored under in the results grid (e.g. "Touch This (TT)").
function ttGridName(){
  const row=Object.values(TT.standings||{}).flat().find(r=>r.tt);
  return (row&&row.team) || 'Touch This (TT)';
}
// One cell of the common-opponents table: overall record plus each scoreline, most recent first.
function h2hCellHTML(games){
  if(!games||!games.length) return '<span class="muted">&mdash;</span>';
  const g=games.slice().sort((a,b)=>((a.date||'')<(b.date||'')?1:-1));
  const w=g.filter(x=>x.res==='W').length, d=g.filter(x=>x.res==='D').length, l=g.filter(x=>x.res==='L').length;
  const rec=d>0?`${w}&ndash;${d}&ndash;${l}`:`${w}&ndash;${l}`;
  const line=g.map(x=>{
    const c=x.res==='W'?'var(--win)':x.res==='L'?'var(--loss)':'var(--draw)';
    return `<span style="color:${c};font-weight:640">${x.res}</span> ${x.gf}&ndash;${x.ga}`;
  }).join('<span class="muted"> &middot; </span>');
  return `<div style="font-weight:650">${rec}</div><div class="muted" style="font-size:12px;margin-top:3px;line-height:1.5">${line}</div>`;
}
function renderOpponent(id){
  const host=$('[data-view="opponent"]'); const o=opp(id);
  if(!o){ host.innerHTML=`<a class="back" href="#fixtures">&larr; Back</a><div class="empty">Unknown opponent.</div>`; return; }
  const h=headToHead(id);
  const kpis=[
    ['Played', h.played.length],
    [h.d>0?'Record (W-D-L)':'Record (W-L)', h.d>0?`${h.w}–${h.d}–${h.l}`:`${h.w}–${h.l}`],
    ['Tries for', withUnknown(h.tf,h.tfU)],
    ['Tries against', withUnknown(h.ta,h.taU)]
  ].map(([l,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');

  const meetings = h.played.map(f=>`
    <tr>
      <td>${fmtDate(f.date)}</td><td>${compPill(f)}</td>
      <td class="num">${scoreText(f)}</td><td class="num">${resBadge(fxResult(f))}</td>
      <td>${scorersText(f)}</td><td>${mvpText(f)}</td>
    </tr>`).join('') || `<tr><td colspan="6"><div class="empty">No completed meetings yet.</div></td></tr>`;

  const up = h.upcoming.length ? `
    <div class="card hero-card mt">
      <div class="wm">${crestSVG()}</div>
      <p class="lead">Next meeting</p>
      <p class="big">${fmtDate(h.upcoming[0].date)}${h.upcoming[0].time?' · '+esc(h.upcoming[0].time):''}</p>
      <p class="story">${h.upcoming[0].competition==='playoff'?'Play-off. ':''}${esc(season(h.upcoming[0].season).name)}${h.upcoming[0].week?', week '+h.upcoming[0].week:''}${h.upcoming[0].venue?' · '+esc(h.upcoming[0].venue):''}.</p>
    </div>` : '';

  // Their full Early Summer league record, week-by-week results + play-off run (official grid)
  const table = TT.standings['2026-spring']||[];
  const st = table.find(r=>r.team===o.name);
  let recordSection='';
  if(st){
    const maxTF=Math.max(...table.map(r=>r.tf)), minTA=Math.min(...table.map(r=>r.ta));
    const results = teamSeasonResults(o.name,'2026-spring');
    const played = results.filter(x=>!x.bye);
    const bigWin = played.filter(x=>x.res==='W').sort((a,b)=>(b.gf-b.ga)-(a.gf-a.ga))[0];
    const bigLoss = played.filter(x=>x.res==='L').sort((a,b)=>(a.gf-a.ga)-(b.gf-b.ga))[0];
    const scout=[];
    if(st.tf===maxTF) scout.push(`Top attack in the division (${st.tf} tries).`);
    if(st.ta===minTA) scout.push(`Meanest defence in the division (${st.ta} conceded).`);
    scout.push(`Averaged ${(st.tf/st.p).toFixed(1)} for and ${(st.ta/st.p).toFixed(1)} against per game.`);
    if(bigWin) scout.push(`Biggest win ${bigWin.gf} to ${bigWin.ga} over ${esc(bigWin.opp)}.`);
    if(bigLoss) scout.push(`Heaviest loss ${bigLoss.gf} to ${bigLoss.ga} to ${esc(bigLoss.opp)}.`);
    const rec=[
      ['League finish', ordinal(st.pos)],
      ['Record (W-L)', `${st.w}–${st.l}`],
      ['Tries for', st.tf],
      ['Tries against', st.ta],
      ['Points', st.pts]
    ].map(([l,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');
    const ours = table.find(r=>r.tt);
    const cmpRows = ours ? [
      ['League finish', ordinal(st.pos), ordinal(ours.pos)],
      ['Record (W-L)', `${st.w}–${st.l}`, `${ours.w}–${ours.l}`],
      ['Tries for', st.tf, ours.tf],
      ['Tries against', st.ta, ours.ta],
      ['Try difference', (st.tf-st.ta>0?'+':'')+(st.tf-st.ta), (ours.tf-ours.ta>0?'+':'')+(ours.tf-ours.ta)],
      ['Points', st.pts, ours.pts]
    ] : [];
    const cmpTable = cmpRows.length ? `
      <div class="card mt">
        <h3>Them vs Touch This &mdash; the season</h3>
        <div class="tablewrap"><table>
          <thead><tr><th></th><th class="num">${esc(o.name)}</th><th class="num cmp-us">Touch This</th></tr></thead>
          <tbody>${cmpRows.map(([m,a,b])=>`<tr><td>${m}</td><td class="num">${a}</td><td class="num cmp-us">${b}</td></tr>`).join('')}</tbody>
        </table></div>
      </div>` : '';
    const formChips = played.map(x=>`<span class="chip ${x.res.toLowerCase()}">${x.res}</span>`).join('');
    const resRows = results.map(x=> x.bye
      ? `<tr><td>${fmtDate(x.date)}</td><td class="muted" colspan="3">Bye week</td></tr>`
      : `<tr class="${/Touch This/.test(x.opp)?'hl':''}"><td>${fmtDate(x.date)}</td><td>${esc(x.opp)}</td><td class="num">${x.gf}&ndash;${x.ga}</td><td class="num">${resBadge(x.res)}</td></tr>`
    ).join('');
    const po=(TT.playoffs['2026-spring']||[]).filter(g=>g.t1===o.name||g.t2===o.name).map(g=>{
      const them=g.t1===o.name, us=them?g.s1:g.s2, opp2=them?g.s2:g.s1, other=them?g.t2:g.t1;
      return `<strong>${esc(g.stage)}</strong> &mdash; ${us>opp2?'beat':'lost to'} ${esc(other)} ${us} to ${opp2}`;
    });
    recordSection=`
      <h2 class="section-t">Their Early Summer 2026</h2>
      <p class="section-s">Full league record, week by week, and how they fared in the knockouts.</p>
      <div class="kpis" style="grid-template-columns:repeat(5,1fr)">${rec}</div>
      <p class="ko-cap">${scout.join(' ')}</p>
      ${cmpTable}
      <div class="card mt">
        <h3>Their league season</h3>
        <div class="form" style="margin:2px 0 14px">${formChips}</div>
        <div class="tablewrap"><table>
          <thead><tr><th>Date</th><th>Opponent</th><th class="num">Score</th><th class="num">Res</th></tr></thead>
          <tbody>${resRows}</tbody>
        </table></div>
      </div>
      ${po.length?`<div class="card mt"><h3>Their play-off run</h3><ul class="facts">${po.map(l=>`<li>${l}</li>`).join('')}</ul></div>`:''}`;
  }

  // Their games in the active (in-progress) season — recent form and every result.
  const TT_GRID = ttGridName();
  const activeSid = (TT.seasons.find(s=>s.status==='active')||{}).id;
  let theirSeasonSection='';
  if(activeSid){
    const rows = teamSeasonResults(o.name, activeSid);
    const played = rows.filter(x=>!x.bye);
    if(played.length){
      const w=played.filter(x=>x.res==='W').length, d=played.filter(x=>x.res==='D').length, l=played.filter(x=>x.res==='L').length;
      const tf=played.reduce((s,x)=>s+x.gf,0), ta=played.reduce((s,x)=>s+x.ga,0);
      const form = played.map(x=>`<span class="chip ${x.res.toLowerCase()}">${x.res}</span>`).join('');
      const body = rows.map(x=> x.bye
        ? `<tr><td>${fmtDate(x.date)}</td><td class="muted" colspan="3">Bye week</td></tr>`
        : `<tr class="${/Touch This/.test(x.opp)?'hl':''}"><td>${fmtDate(x.date)}</td><td>${esc(x.opp)}</td><td class="num">${x.gf}&ndash;${x.ga}</td><td class="num">${resBadge(x.res)}</td></tr>`
      ).join('');
      theirSeasonSection=`
        <h2 class="section-t">Their ${esc(season(activeSid).name)} so far</h2>
        <p class="section-s">${esc(o.name)}&rsquo;s results this season &mdash; recent form and every game played.</p>
        <div class="card">
          <div class="form" style="margin:2px 0 12px">${form}</div>
          <p class="ko-cap" style="margin:0 0 12px">Played ${played.length} &middot; ${d>0?`${w}&ndash;${d}&ndash;${l}`:`${w}&ndash;${l}`} &middot; ${tf} tries for, ${ta} against.</p>
          <div class="tablewrap"><table>
            <thead><tr><th>Date</th><th>Opponent</th><th class="num">Score</th><th class="num">Res</th></tr></thead>
            <tbody>${body}</tbody>
          </table></div>
        </div>`;
    }
  }

  // Common opponents — how Touch This has fared against the teams this opponent has played.
  const theirsByOpp = resultsByOpponentAllSeasons(o.name);
  const oursByOpp = resultsByOpponentAllSeasons(TT_GRID);
  const commonNames = Object.keys(theirsByOpp)
    .filter(n=>!/Touch This/.test(n) && oursByOpp[n])
    .sort((a,b)=>{
      const la=theirsByOpp[a].reduce((m,x)=>x.date>m?x.date:m,''), lb=theirsByOpp[b].reduce((m,x)=>x.date>m?x.date:m,'');
      return la<lb?1:la>lb?-1:a.localeCompare(b);
    });
  let commonSection='';
  if(commonNames.length){
    const crows=commonNames.map(nm=>`
      <tr>
        <td>${esc(nm)}</td>
        <td>${h2hCellHTML(theirsByOpp[nm])}</td>
        <td class="cmp-us">${h2hCellHTML(oursByOpp[nm])}</td>
      </tr>`).join('');
    commonSection=`
      <h2 class="section-t">Common opponents</h2>
      <p class="section-s">How Touch This has fared against the teams ${esc(o.name)} has played &mdash; a like-for-like read across every shared opponent.</p>
      <div class="card">
        <div class="tablewrap"><table>
          <thead><tr><th>Opponent</th><th>${esc(o.name)}</th><th class="cmp-us">Touch This</th></tr></thead>
          <tbody>${crows}</tbody>
        </table></div>
      </div>`;
  }

  host.innerHTML = `
    <a class="back" href="#fixtures">&larr; All fixtures</a>
    <h2 class="section-t">${esc(o.name)}</h2>
    <p class="section-s">${o.notes?esc(o.notes):'Head-to-head record and previous meetings.'}</p>
    <h2 class="section-t">Head-to-head vs Touch This</h2>
    <div class="kpis" style="grid-template-columns:repeat(4,1fr)">${kpis}</div>
    ${up}
    <h2 class="section-t">Previous meetings</h2>
    <div class="tablewrap"><table>
      <thead><tr><th>Date</th><th>Comp</th><th class="num">Score</th><th class="num">Res</th><th>Try scorers</th><th>MVP</th></tr></thead>
      <tbody>${meetings}</tbody>
    </table></div>
    ${theirSeasonSection}
    ${commonSection}
    ${recordSection}`;
}

function renderPlayer(id){
  const host=$('[data-view="player"]');
  const p=player(id);
  if(!p){ host.innerHTML=`<a class="back" href="#players">&larr; All players</a><div class="empty">Unknown player.</div>`; return; }

  // squad role, derived per season
  let roleLine;
  if(Object.values(TT.squads||{}).some(sq=>(sq.captains||[]).includes(id))) roleLine='Co-captain';
  else{
    const coreIn=Object.keys(TT.squads||{}).filter(sid=>(TT.squads[sid].core||[]).includes(id))
      .map(sid=>(season(sid)?.name||sid).replace(/\s*20\d\d/,''));
    roleLine = coreIn.length ? 'Core team · '+coreIn.join(', ') : 'Ringer';
  }

  const when = f => `${f.week?'Week '+f.week:(f.competition==='playoff'?'Play-off':fmtDate(f.date))} · ${esc((season(f.season)?.name||'').replace(/\s*20\d\d/,''))}`;
  const byDate=(a,b)=>(a.date||'')<(b.date||'')?-1:1;

  const playedIn = TT.fixtures.filter(f=>f.played && Array.isArray(f.lineup) && f.lineup.includes(id));
  const gp = playedIn.length;
  const triesIn = f => (f.scorers||[]).reduce((t,s)=>{const pid=typeof s==='string'?s:s.player; return pid===id ? t+(typeof s==='string'?1:(s.tries||1)) : t;},0);
  const scoredIn = TT.fixtures.filter(f=>f.played && triesIn(f)>0).sort(byDate);
  const tries = scoredIn.reduce((t,f)=>t+triesIn(f),0);
  const mvps = TT.fixtures.filter(f=>f.played && f.mvp && f.mvp.player===id).sort(byDate).reverse();

  const kpis = [
    ['Games', gp],
    ['Tries', tries],
    ['MVP awards', mvps.length],
    ['Tries a game', gp ? (tries/gp).toFixed(1) : '0']
  ].map(([l,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');

  const attRows = TT.seasons.map(s=>{
    const games = TT.fixtures.filter(f=>f.season===s.id && f.played && Array.isArray(f.lineup)).sort(byDate);
    if(!games.length) return '';
    const n = games.filter(f=>f.lineup.includes(id)).length;
    return `<div class="pl-row">
      <div style="flex:1;min-width:0"><span class="pl-name">${esc(s.name)}</span></div>
      <span>${attDotsHTML(games,id)}</span>
      <span class="pl-count">${n}/${games.length}</span>
    </div>`;
  }).join('');

  // moments: scan match highlights for mentions. Known limits, accepted: shared
  // nicknames (Gayatri and Ella both hold "El Capitan") would match both players,
  // common-word names could false-positive, and notes are not scanned.
  const names=[...new Set([p.name, p.first, p.name.split(' ')[0], p.nickname, p.id].filter(n=>n&&n.length>2))];
  const pats = names.map(n=>new RegExp('\\b'+escapeRegExp(n)+'\\b','i'));
  const moments=[];
  TT.fixtures.filter(f=>f.played && Array.isArray(f.highlights)).sort(byDate).forEach(f=>{
    f.highlights.forEach(hl=>{ if(pats.some(rx=>rx.test(hl))) moments.push({f,hl}); });
  });

  host.innerHTML = `
    <a class="back" href="#players">&larr; All players</a>
    <div class="player-head">
      <div class="pl-av">${esc(firstName(id).slice(0,1).toUpperCase())}</div>
      <div>
        <div class="p-name">${esc(firstName(id))}${nickHTML(id)}${flagHTML(id)}</div>
        <div class="p-sub">${esc(roleLine)}</div>
      </div>
    </div>
    ${p.role?`<p class="section-s" style="max-width:680px;margin-top:0">${esc(p.role)}</p>`:''}
    <div class="kpis k4" style="margin-top:14px">${kpis}</div>
    <h2 class="section-t">Attendance</h2>
    ${attRows?`<div class="card pl-rows">${attRows}</div>`:'<div class="empty">No attendance logged yet.</div>'}
    ${scoredIn.length?`
    <h2 class="section-t">Games scored in</h2>
    <div class="card"><ul class="facts">${scoredIn.map(f=>{
      const n=triesIn(f);
      return `<li><a href="#report/${f.id}">${when(f)} vs ${esc(f.opponent?oppName(f.opponent):'TBC')}</a> &mdash; ${n===1?'1 try':n+' tries'}</li>`;
    }).join('')}</ul></div>`:''}
    ${mvps.length?`
    <h2 class="section-t">MVP awards</h2>
    <div class="card"><ul class="facts">${mvps.map(f=>
      `<li><a href="#report/${f.id}">${when(f)} vs ${esc(f.opponent?oppName(f.opponent):'TBC')}</a>${f.mvp.reason?` &mdash; <span style="font-style:italic">&ldquo;${esc(f.mvp.reason)}&rdquo;</span>`:''}</li>`
    ).join('')}</ul></div>`:''}
    ${moments.length?`
    <h2 class="section-t">Moments</h2>
    <div class="card"><ul class="facts">${moments.map(m=>
      `<li>${esc(m.hl)} <span class="muted">&middot; <a href="#report/${m.f.id}">${when(m.f)}</a></span></li>`
    ).join('')}</ul></div>`:''}`;
}

/* ---------- first-win celebration: confetti + a synth fanfare, no deps ---------- */
function ttConfettiBurst(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  let c=document.getElementById('tt-confetti');
  if(!c){ c=document.createElement('canvas'); c.id='tt-confetti';
    Object.assign(c.style,{position:'fixed',inset:'0',width:'100%',height:'100%',pointerEvents:'none',zIndex:'9999'});
    document.body.appendChild(c); }
  const ctx=c.getContext('2d'), dpr=Math.min(2,window.devicePixelRatio||1);
  let W,H; const size=()=>{ W=c.width=innerWidth*dpr; H=c.height=innerHeight*dpr; };
  size(); addEventListener('resize',size);
  const cols=['#1e88e5','#ffc107','#e53935','#43a047','#8e24aa','#ff7043','#ffffff'], parts=[];
  // two cannons from the lower corners, arcing up and across
  [[0.12,1],[0.88,-1]].forEach(([px,dir])=>{ for(let i=0;i<110;i++){
    const a=(Math.random()*0.5+0.15)*Math.PI, sp=(Math.random()*9+11)*dpr;
    parts.push({ x:W*px, y:H*1.02, vx:Math.cos(a)*sp*dir, vy:-Math.sin(a)*sp,
      g:0.34*dpr, w:(6+Math.random()*7)*dpr, h:(9+Math.random()*9)*dpr,
      rot:Math.random()*7, vr:(Math.random()-0.5)*0.35, col:cols[(i+ (dir>0?0:3))%cols.length], life:1 }); }});
  let frame=0;
  (function tick(){ frame++; ctx.clearRect(0,0,W,H); let alive=false;
    for(const p of parts){ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.vx*=0.99; p.rot+=p.vr;
      if(frame>140) p.life-=0.02;
      if(p.y<H+40*dpr && p.life>0) alive=true;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.col; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); }
    if(alive && frame<340) requestAnimationFrame(tick); else c.remove();
  })();
}
let ttAC=null, ttSoundPlayed=false;
function ttAudioCtx(){ const AC=window.AudioContext||window.webkitAudioContext; return AC ? (ttAC||(ttAC=new AC())) : null; }
function ttFanfare(){
  if(ttSoundPlayed) return; const ac=ttAudioCtx(); if(!ac||ac.state!=='running') return;
  ttSoundPlayed=true; const now=ac.currentTime;
  // rising major arpeggio C-E-G-C, then a little sparkle
  [[523.25,0],[659.25,0.11],[783.99,0.22],[1046.5,0.34],[1318.5,0.46]].forEach(([f,t],i)=>{
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=i===4?'sine':'triangle'; o.frequency.value=f; o.connect(g); g.connect(ac.destination);
    const s=now+t; g.gain.setValueAtTime(0.0001,s);
    g.gain.exponentialRampToValueAtTime(i===4?0.18:0.26,s+0.03);
    g.gain.exponentialRampToValueAtTime(0.0008,s+(i===4?0.7:0.55));
    o.start(s); o.stop(s+0.75); });
}
function celebrateFirstWin(){
  const win = (typeof firstWinFixture==='function') && firstWinFixture(); if(!win) return;
  const key='tt-celebrated-'+win.id;
  try{ if(sessionStorage.getItem(key)) return; sessionStorage.setItem(key,'1'); }catch(e){}
  ttConfettiBurst();                              // visual needs no user gesture
  const ac=ttAudioCtx();
  const play=()=>{ if(!ac) return; if(ac.state==='suspended') ac.resume().then(ttFanfare).catch(()=>{}); else ttFanfare(); };
  play();                                         // try now; browsers may block audio until a gesture
  const once=()=>{ play(); ['pointerdown','keydown','touchstart'].forEach(ev=>removeEventListener(ev,once)); };
  ['pointerdown','keydown','touchstart'].forEach(ev=>addEventListener(ev,once));
}

/* ---------- router + boot ---------- */
const VIEWS=['home','fixtures','table','players','stats'];
function renderAll(){ renderHome(); renderFixtures(); renderTable(); renderPlayoffs(); renderPlayers(); renderStats(); }
function route(){
  let [view,arg]=(location.hash.replace(/^#/,'')||'home').split('/');
  if(view==='playoffs') view='table'; // legacy hash: play-offs now live on the Standings tab
  const v = (view==='opponent'||view==='report'||view==='player') ? view : (VIEWS.includes(view)?view:'home');
  $$('[data-view]').forEach(sec=>sec.hidden = sec.dataset.view!==v);
  $$('#seg button').forEach(b=>b.classList.toggle('active', b.dataset.nav===v));
  if(v==='opponent') renderOpponent(arg);
  if(v==='report') renderReport(arg);
  if(v==='player') renderPlayer(arg);
  window.scrollTo(0,0);
}

function boot(){
  // crest
  $('#crest').innerHTML=crestSVG();
  $('#wordmark').innerHTML=wordmarkSVG();
  // default season (each season-scoped tab renders its own toggle)
  curSeason = (TT.seasons.find(s=>s.status==='active')||TT.seasons[0]).id;
  // nav
  $$('#seg button').forEach(b=>b.addEventListener('click',()=>{ location.hash='#'+b.dataset.nav; }));

  // live first-win clock
  setInterval(()=>{
    const cd=$('#gd-cdvalue'); if(cd) cd.textContent=countdownStr(nextFixture());
    const dr=$('#gd-drought'); if(dr) dr.textContent=firstWinCompact();
  }, 1000);

  renderAll();
  window.addEventListener('hashchange',route);
  route();
  celebrateFirstWin();   // confetti + fanfare, once per session, while the first win stands
}
boot();
